  // Invert + crop bottom half — accepts base64, returns base64
  function invertImageB64(b64){
    return new Promise(resolve=>{
      const img=new Image();
      img.onload=()=>{
        try{
          const sc=Math.min(1,1600/img.naturalWidth);
          const cw=Math.round(img.naturalWidth*sc);
          const ch=Math.round(img.naturalHeight*sc);
          const c=document.createElement('canvas');c.width=cw;c.height=ch;
          const ctx=c.getContext('2d');ctx.drawImage(img,0,0,cw,ch);
          const bY=Math.round(ch*0.48);const bH=ch-bY;
          const c2=document.createElement('canvas');c2.width=cw;c2.height=bH;
          const ctx2=c2.getContext('2d');
          ctx2.drawImage(c,0,bY,cw,bH,0,0,cw,bH);
          const id=ctx2.getImageData(0,0,cw,bH);
          for(let i=0;i<id.data.length;i+=4){
            id.data[i]=255-id.data[i];
            id.data[i+1]=255-id.data[i+1];
            id.data[i+2]=255-id.data[i+2];
          }
          ctx2.putImageData(id,0,0);
          resolve(c2.toDataURL('image/png'));
        }catch(e){resolve(b64);}
      };
      img.onerror=()=>resolve(b64);
      img.src=b64;
    });
  }

  // Canvas barcode strip reader — accepts base64, returns VIN or null
  function canvasBarcodeRead(b64){
    return new Promise(resolve=>{
      const img=new Image();
      img.onload=()=>{
        try{
          const W=800;
          const H=Math.round(img.naturalHeight*(W/img.naturalWidth));
          const c=document.createElement('canvas');c.width=W;c.height=H;
          const ctx=c.getContext('2d');ctx.drawImage(img,0,0,W,H);
          const results=[];
          const startY=Math.round(H*0.4);
          for(let pass=0;pass<2;pass++){
            for(let row=startY;row<H-5;row+=4){
              const pixels=ctx.getImageData(0,row,W,1).data;
              let transitions=0,prevLum=-1;
              for(let x=0;x<W;x++){
                const i=x*4;
                let lum=pixels[i]*0.299+pixels[i+1]*0.587+pixels[i+2]*0.114;
                if(pass===1)lum=255-lum;
                const bit=lum>128?1:0;
                if(prevLum!==-1&&bit!==prevLum)transitions++;
                prevLum=bit;
              }
              if(transitions>50&&transitions<400){
                const rc=document.createElement('canvas');rc.width=W;rc.height=44;
                const rCtx=rc.getContext('2d');
                rCtx.drawImage(c,0,Math.max(0,row-20),W,40,0,0,W,40);
                if(pass===1){
                  const rd=rCtx.getImageData(0,0,W,44);
                  for(let i=0;i<rd.data.length;i+=4){rd.data[i]=255-rd.data[i];rd.data[i+1]=255-rd.data[i+1];rd.data[i+2]=255-rd.data[i+2];}
                  rCtx.putImageData(rd,0,0);
                }
                results.push(rc.toDataURL('image/png'));
              }
            }
          }
          if(!results.length||!('BarcodeDetector' in window)){resolve(null);return;}
          const det=new window.BarcodeDetector({formats:['code_39','code_128']});
          const strips=results.slice(0,10);
          let idx=0,found=null;
          function next(){
            if(idx>=strips.length||found){resolve(found);return;}
            loadImg(strips[idx++]).then(imgEl=>{
              createImageBitmap(imgEl).then(bmp=>{
                det.detect(bmp).then(codes=>{
                  for(const code of codes){const v=extractVin(code.rawValue||'');if(v){found=v;resolve(v);return;}}
                  next();
                }).catch(next);
              }).catch(next);
            }).catch(next);
          }
          next();
        }catch(e){resolve(null);}
      };
      img.onerror=()=>resolve(null);
      img.src=b64;
    });
  }

  function scanLoop(){
    if(!scanActive)return;
    const video=document.getElementById('vm-video');
    if(!video||video.readyState<2){scanRaf=requestAnimationFrame(scanLoop);return}

    if('BarcodeDetector' in window){
      const detector=new window.BarcodeDetector({formats:['code_39','code_128','pdf417','data_matrix','qr_code','ean_13','ean_8','upc_a']});
      const canvas=document.createElement('canvas');
      canvas.width=video.videoWidth;canvas.height=video.videoHeight;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(video,0,0);
      detector.detect(canvas).then(codes=>{
        if(!scanActive)return;
        for(const code of codes){
          const raw=code.rawValue.trim().toUpperCase().replace(/[^A-HJ-NPR-Z0-9]/g,'');
          if(raw.length===17){
            showDetected(raw);return;
          }
          // Try extracting 17-char sequence from longer strings (VIN plate text)
          const match=raw.match(/[A-HJ-NPR-Z0-9]{17}/);
          if(match){showDetected(match[0]);return;}
        }
        scanRaf=requestAnimationFrame(scanLoop);
      }).catch(()=>{scanRaf=requestAnimationFrame(scanLoop);});
    }else{

  };
  const toggleSt=id=>{
    const cur=v.statuses||[];
    const next=cur.includes(id)?cur.filter(s=>s!==id):[...cur,id];
    const updates={statuses:next};
    // Sale pending / sold = automatic high priority
    if((next.includes('sale_pending')||next.includes('sold'))&&v.priority!=='high'){
      updates.priority='high';
    }
    save(updates);
  };


  // ══════════════════════════════════════════════
  // RECEIPT SCANNER (AI)
  // ══════════════════════════════════════════════
  // Extract auto parts from a receipt (image OR PDF) via the Worker.
  // Returns: {items: [...], tax: number, documentType: 'image'|'pdf'} or null on error
  async function scanReceiptWithAI(dataUrl){
    const match=dataUrl.match(/^data:([^;]+);base64,(.+)$/);
    if(!match){console.error('Receipt AI: input not a data URL');return null;}
    const mimeType=match[1], b64data=match[2];
    // Prefer dedicated receipt worker if configured, else fall back to old /receipt
    const useNewWorker = AI_PROXY_RECEIPT && !AI_PROXY_RECEIPT.includes('__RECEIPT_WORKER_URL_HERE__');
    const endpoint = useNewWorker ? AI_PROXY_RECEIPT + '/receipt' : AI_PROXY + '/receipt';
    try{
      console.log('[Receipt AI] POST', endpoint, Math.round(b64data.length/1024)+'KB', mimeType);
      const resp=await fetch(endpoint,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({documentData:b64data,imageData:b64data,mediaType:mimeType})
      });
      if(!resp.ok){
        const errText = await resp.text().catch(()=>'');
        console.error('Receipt AI HTTP', resp.status, errText.slice(0,300));
        return null;
      }
      const data=await resp.json();
      if(data.debug_raw){console.warn('[Receipt AI] raw output:',data.debug_raw);}
      const raw=(data.items||'[]');
      const clean=raw.replace(/```json|```/g,'').trim();
      const arr=JSON.parse(clean);
      const items = Array.isArray(arr) ? arr : [];
      const tax = typeof data.tax === 'number' ? data.tax : parseFloat(data.tax) || 0;
      console.log('[Receipt AI] Extracted', items.length, 'items · tax $', tax.toFixed(2));
      return {items, tax, documentType: data.documentType || 'image'};
    }catch(e){console.error('Receipt AI error',e);return null;}
  }

    };

  function buildHistoryTab(el){
    const ownVisits = (v.visits || []).map(visit=>({visit, vehicle:v, isOwn:true}));

    // Pull visits from OTHER records with the same VIN (read-only cross-record history)
    const sameVinOthers = [];
    if(v.vin){
      const vinKey = v.vin.trim().toUpperCase();
      ST.vehicles.forEach(other=>{
        if(other.id === v.id) return;
        if(!other.vin) return;
        if(other.vin.trim().toUpperCase() !== vinKey) return;
        (other.visits||[]).forEach(visit=>{
          sameVinOthers.push({visit, vehicle:other, isOwn:false});
        });
      });
    }

    const allEntries = [...ownVisits, ...sameVinOthers];
    if(!allEntries.length){
      el.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><div class="empty-msg">No service history</div></div>';
      return;
    }

    const curVisitId = currentVisit(v)?.id;
    // Sort all entries by dateIn descending (newest first)
    allEntries.sort((a,b)=>(b.visit.dateIn||0)-(a.visit.dateIn||0));

    const ownCount = ownVisits.length;
    const otherCount = sameVinOthers.length;
    let headerText = ownCount + ' service visit' + (ownCount!==1?'s':'') + ' for this record';
    if(otherCount > 0){
      headerText += ' · ' + otherCount + ' more on this VIN (other records)';
    }
    let html = '<div style="font-size:11px;color:var(--text3);margin-bottom:12px;letter-spacing:.5px;text-transform:uppercase;font-weight:600">'+headerText+'</div>';

    // For visit numbering: count visits per record separately
    const ownVisitsByOldest = [...(v.visits||[])].sort((a,b)=>(a.dateIn||0)-(b.dateIn||0));

    allEntries.forEach((entry, idx)=>{
      const {visit, vehicle, isOwn} = entry;
      const isCurrent = isOwn && visit.id === curVisitId;
      const visitNum = isOwn
        ? (ownVisitsByOldest.findIndex(x=>x.id===visit.id) + 1)
        : ((vehicle.visits||[]).findIndex(x=>x.id===visit.id) + 1);
      const statusLabels = (visit.statuses||[]).map(sid=>SMAP[sid]).filter(Boolean);
      const partsCost = (visit.parts||[]).reduce((a,p)=>a+((parseFloat(p.cost)||0)*(parseInt(p.qty)||1)),0);
      const laborCost = (visit.laborLines||[]).reduce((a,l)=>a+((parseFloat(l.hours)||0)*(parseFloat(l.rate)||0)),0);
      const legacyCost = (visit.repairs||[]).reduce((a,r)=>a+Number(r.cost||0),0);
      const total = partsCost + laborCost + legacyCost;
      const mech = visit.assignedTo ? getMMAP()[visit.assignedTo] : null;
      const dateIn = visit.dateIn ? new Date(visit.dateIn).toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'}) : '—';
      const dateOut = visit.dateOut ? new Date(visit.dateOut).toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'}) : null;
      const isBooked = (visit.statuses||[]).includes('booked');

      // Styling: read-only entries get dimmed appearance + clickable to jump to that record
      const borderLeft = isCurrent ? '#C8102E' : (!isOwn ? '#8896a8' : (isBooked ? '#818cf8' : 'var(--border2)'));
      const border = isCurrent ? '#C8102E' : (!isOwn ? 'var(--border)' : 'var(--border)');
      const bg = !isOwn ? '#0a0c11' : 'var(--surface)';
      const opacity = !isOwn ? '0.78' : '1';
      const cursor = !isOwn ? 'pointer' : 'default';
      const clickHandler = !isOwn
        ? ' onclick="ST.selectedId=\''+vehicle.id+'\';ST.view=\'detail\';ST.activeTab=\'history\';render();"'
        : '';

      html += '<div style="background:'+bg+';border:1px solid '+border+';border-left:3px solid '+borderLeft+';border-radius:var(--r-lg);padding:14px 15px;margin-bottom:10px;opacity:'+opacity+';cursor:'+cursor+'"'+clickHandler+'>';

      html += '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px">';
      html += '<div style="min-width:0;flex:1"><div style="font-size:14px;font-weight:700;color:#fff;margin-bottom:3px">';
      html += (isOwn ? '✏️ Visit #'+visitNum : '📖 Visit #'+visitNum);
      if(isCurrent){
        html += '<span style="font-size:10px;background:#C8102E22;color:#C8102E;padding:2px 7px;border-radius:var(--r);letter-spacing:.5px;margin-left:6px;font-weight:700;text-transform:uppercase">Current</span>';
      } else if(!isOwn){
        html += '<span style="font-size:10px;background:#1a2035;color:#8896a8;padding:2px 7px;border-radius:var(--r);letter-spacing:.5px;margin-left:6px;font-weight:700;text-transform:uppercase">Read-only</span>';
      }
      html += '</div>';

      if(!isOwn){
        html += '<div style="font-size:11px;color:#60a5fa;margin-bottom:3px;font-weight:600">Other record: Stock #'+(vehicle.stockNumber||'—')+' · tap to open →</div>';
      }

      html += '<div style="font-size:11px;color:var(--text3);letter-spacing:.3px">In: <strong style="color:var(--text2)">'+dateIn+'</strong>';
      if(dateOut) html += ' · Out: <strong style="color:var(--text2)">'+dateOut+'</strong>';
      html += '</div></div>';
      html += '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">';
      html += '<div style="font-size:15px;font-weight:800;color:#C8102E;text-align:right;font-variant-numeric:tabular-nums">'+fmt$(total)+'</div>';
      // Per-visit delete button — OWN visits only, when unlocked, and only if >1 visit exists on this record
      if(isOwn && ST.masterPinUnlocked && ownVisits.length > 1){
        html += '<button onclick="event.stopPropagation();deleteVisitById(\''+visit.id+'\')" title="Delete this visit" style="background:#1a0d0d;border:1px solid #f8717155;color:#fca5a5;border-radius:6px;padding:4px 9px;font-size:11px;font-weight:600;cursor:pointer">🗑 Delete</button>';
      }
      html += '</div>';
      html += '</div>';

      html += '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:6px;font-size:11px;color:var(--text3);margin-bottom:8px">';
      html += '<div><span style="color:var(--text4);text-transform:uppercase;font-weight:600;letter-spacing:.5px">Stock #</span> <span style="color:var(--text2);font-weight:600">'+(visit.stockNumber||'—')+'</span></div>';
      html += '<div><span style="color:var(--text4);text-transform:uppercase;font-weight:600;letter-spacing:.5px">Mechanic</span> <span style="color:'+(mech?mech.color:'var(--text3)')+';font-weight:600">'+(mech?mech.icon+' '+mech.name:'— Unassigned')+'</span></div>';
      html += '<div><span style="color:var(--text4);text-transform:uppercase;font-weight:600;letter-spacing:.5px">Parts</span> <span style="color:var(--text2);font-weight:600">'+(visit.parts||[]).length+'</span></div>';
      html += '<div><span style="color:var(--text4);text-transform:uppercase;font-weight:600;letter-spacing:.5px">Labor</span> <span style="color:var(--text2);font-weight:600">'+(visit.laborLines||[]).length+' line'+((visit.laborLines||[]).length!==1?'s':'')+'</span></div>';
      html += '</div>';

      if(statusLabels.length){
        html += '<div style="display:flex;flex-wrap:wrap;gap:3px">';
        html += statusLabels.map(s=>'<span class="v-tag" style="background:'+s.color+'22;color:'+s.color+';border:1px solid '+s.color+'55">'+s.icon+' '+s.label+'</span>').join('');
        html += '</div>';
      }
      html += '</div>';
    });
    el.innerHTML = html;
  }

  function buildTimeClockTab(el){
    const sessions=v.timeSessions||[];
    const isManager=ST.role==='manager';
    // Find ALL active sessions on this vehicle (any mechanic)
    const activeSessions=sessions.filter(s=>!s.end);
    // Active session for current role (mechanic clocked in themselves)
    const myActiveSess=!isManager?sessions.find(s=>s.mechId===ST.role&&!s.end):null;

    // Compute total hours per mechanic
    const mechTotals={};
    sessions.filter(s=>s.end).forEach(s=>{
      const hrs=(s.end-s.start)/3600000;
      mechTotals[s.mechId]=(mechTotals[s.mechId]||0)+hrs;
    });
    const totalHours=Object.values(mechTotals).reduce((a,b)=>a+b,0);

    const wrapper=document.createElement('div');

    // ── ACTIVE SESSIONS BANNER ──
    if(activeSessions.length){
      activeSessions.forEach(sess=>{
        const clockedMech=sess.mechId?getMMAP()[sess.mechId]:null;
        const elapsed=Date.now()-sess.start;
        const hh=Math.floor(elapsed/3600000).toString().padStart(2,'0');
        const mm=Math.floor((elapsed%3600000)/60000).toString().padStart(2,'0');
        const ss2=Math.floor((elapsed%60000)/1000).toString().padStart(2,'0');
        const banner=document.createElement('div');
        banner.style.cssText='background:#0d2a0d;border:1px solid #166534;border-radius:12px;padding:18px 16px;margin-bottom:10px;display:flex;flex-direction:column;align-items:center;gap:8px';
        const timerId='tc-timer-'+sess.id;
        banner.innerHTML=`<div style="font-size:11px;color:#4ade80;letter-spacing:1.5px;font-weight:600">● CLOCKED IN — ${(clockedMech?.name||sess.mechId||'?').toUpperCase()}</div>
          <div id="${timerId}" style="font-size:38px;font-weight:700;color:#fff;font-family:monospace;letter-spacing:2px">${hh}:${mm}:${ss2}</div>
          <div style="font-size:12px;color:#9ca3af">Started ${new Date(sess.start).toLocaleTimeString()}</div>
          ${(isManager||sess.mechId===ST.role)?`<button class="btn-red" style="margin-top:4px;padding:11px 32px;border-radius:9px;font-size:14px;font-weight:700;width:100%;max-width:240px" onclick="clockOutSession('${sess.id}')">⏹ Clock out</button>`:''}`;
        wrapper.appendChild(banner);
        const iv=setInterval(()=>{
          const el2=document.getElementById(timerId);
          if(!el2){clearInterval(iv);return;}
          const e2=Date.now()-sess.start;
          el2.textContent=[Math.floor(e2/3600000),Math.floor((e2%3600000)/60000),Math.floor((e2%60000)/1000)].map(n=>n.toString().padStart(2,'0')).join(':');
        },1000);
      });
    }

    // ── CLOCK IN/OUT SECTION ──
    const activeMechIds=new Set(activeSessions.map(s=>s.mechId));

    if(isManager){
      // Manager: buttons for all mechanics
      const availMechs=getMechs().filter(m=>!activeMechIds.has(m.id));
      if(availMechs.length){
        const mp=document.createElement('div');
        mp.style.cssText='margin-bottom:14px';
        mp.innerHTML=`<div style="font-size:11px;color:#555d73;letter-spacing:.8px;font-weight:600;margin-bottom:8px">CLOCK IN A MECHANIC</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            ${availMechs.map(m=>`<button style="background:#111318;border:1.5px solid #2a2f3f;border-radius:10px;padding:12px 14px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;min-width:70px;transition:border-color .15s" onmouseover="this.style.borderColor='${m.color}'" onmouseout="this.style.borderColor='#2a2f3f'" onclick="clockInAs('${m.id}')"><span style="font-size:22px">${m.icon}</span><span style="font-size:11px">${m.name}</span><span style="font-size:10px;color:#555d73">$${m.laborRate||65}/hr</span></button>`).join('')}
          </div>`;
        wrapper.appendChild(mp);
      }
    } else {
      // Mechanic: always show clock in OR clock out based on current state
      const allActiveCarsCount=ST.vehicles.filter(veh=>(veh.timeSessions||[]).some(s=>s.mechId===ST.role&&!s.end)).length;
      const clockBtn=document.createElement('button');
      if(myActiveSess){
        // Clocked in — show clock out
        clockBtn.style.cssText='width:100%;padding:16px;border-radius:10px;font-size:15px;font-weight:700;letter-spacing:.5px;margin-bottom:14px;background:#0d2a0d;border:1.5px solid #166534;color:#4ade80;cursor:pointer';
        clockBtn.innerHTML='⏹ CLOCK OUT — stop working on this vehicle';
        clockBtn.onclick=()=>clockOut();
      } else if(allActiveCarsCount>=4){
        clockBtn.className='btn-red';
        clockBtn.style.cssText='width:100%;padding:16px;border-radius:10px;font-size:14px;font-weight:600;margin-bottom:14px;opacity:.5;cursor:not-allowed';
        clockBtn.textContent='Max 4 cars at once — clock out another first';
        clockBtn.disabled=true;
      } else {
        clockBtn.className='btn-red';
        clockBtn.style.cssText='width:100%;padding:16px;border-radius:10px;font-size:15px;font-weight:700;letter-spacing:.5px;margin-bottom:14px';
        clockBtn.innerHTML='▶ CLOCK IN — start working on this vehicle';
        clockBtn.onclick=()=>clockIn();
      }
      wrapper.appendChild(clockBtn);
    }

    // ── STATS ──
    const statsDiv=document.createElement('div');
    statsDiv.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px';
    statsDiv.innerHTML=`
      <div style="background:#111318;border:1px solid #2a2f3f;border-radius:10px;padding:13px;text-align:center">
        <div style="font-size:10px;color:#555d73;margin-bottom:3px">Completed sessions</div>
        <div style="font-size:20px;font-weight:700;color:#fff">${sessions.filter(s=>s.end).length}</div>
      </div>
      <div style="background:#111318;border:1px solid #2a2f3f;border-radius:10px;padding:13px;text-align:center">
        <div style="font-size:10px;color:#555d73;margin-bottom:3px">Total hours</div>
        <div style="font-size:20px;font-weight:700;color:#C8102E">${totalHours.toFixed(1)}h</div>
      </div>`;
    wrapper.appendChild(statsDiv);

    // ── SESSION LOG ──
    const secHdr=document.createElement('div');
    secHdr.className='sec-hdr';secHdr.textContent='SESSION LOG';
    wrapper.appendChild(secHdr);

    const finished=[...sessions].filter(s=>s.end).sort((a,b)=>b.start-a.start);
    if(!finished.length&&!activeSessions.length){
      const ep=document.createElement('div');
      ep.style.cssText='color:#374151;font-size:13px;padding:14px 0;text-align:center';
      ep.textContent='No sessions yet — clock in to start tracking time';
      wrapper.appendChild(ep);
    }
    finished.forEach(s=>{
      const mech=s.mechId?getMMAP()[s.mechId]:null;
      const mins=Math.round((s.end-s.start)/60000);
      const hrs=((s.end-s.start)/3600000).toFixed(2);
      const row=document.createElement('div');
      row.style.cssText='background:#111318;border:1px solid #1e2230;border-radius:9px;padding:11px 14px;margin-bottom:7px;display:flex;align-items:center;gap:12px';
      row.innerHTML=`
        <div style="width:34px;height:34px;border-radius:50%;background:${mech?.color||'#374151'}22;border:1px solid ${mech?.color||'#374151'}44;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0">${mech?.icon||'🔧'}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;color:#fff">${mech?.name||s.mechId}</div>
          <div style="font-size:11px;color:#555d73">${new Date(s.start).toLocaleDateString()} · ${new Date(s.start).toLocaleTimeString([],'')}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:14px;font-weight:700;color:#C8102E">${mins}m</div>
          <div style="font-size:10px;color:#555d73">${hrs}h</div>
        </div>
        ${isManager?`<button class="del-btn" onclick="deleteSession('${s.id}')">✕</button>`:''}`;
      wrapper.appendChild(row);
    });

    el.appendChild(wrapper);

    window.clockIn=function(){
      const allActive=ST.vehicles.filter(veh=>(veh.timeSessions||[]).some(s=>s.mechId===ST.role&&!s.end)).length;
      if(allActive>=4){toast('Max 4 cars at once','err');return;}
      const sess={id:uid(),mechId:ST.role,vehicleId:v.id,start:Date.now(),end:null};
      writeToCurrentVisit(v,'timeSessions',[...(v.timeSessions||[]),sess]);
      ST.vehicles=ST.vehicles.map(x=>x.id===v.id?v:x);window.save();toast('Clocked in!');refreshDetail();
    };
    window.clockInAs=function(mechId){
      if(activeMechIds.has(mechId)){toast(getMMAP()[mechId]?.name+' already clocked in','err');return;}
      const allActive=ST.vehicles.filter(veh=>(veh.timeSessions||[]).some(s=>s.mechId===mechId&&!s.end)).length;
      if(allActive>=4){toast(getMMAP()[mechId]?.name+' already on 4 cars','err');return;}
      const sess={id:uid(),mechId,vehicleId:v.id,start:Date.now(),end:null};
      writeToCurrentVisit(v,'timeSessions',[...(v.timeSessions||[]),sess]);
      ST.vehicles=ST.vehicles.map(x=>x.id===v.id?v:x);window.save();toast(getMMAP()[mechId]?.name+' clocked in!');refreshDetail();
    };
    window.clockOutSession=function(sessId){
      const sessions=[...(v.timeSessions||[])];
      const idx2=sessions.findIndex(s=>s.id===sessId);
      if(idx2<0)return;
      sessions[idx2]={...sessions[idx2],end:Date.now()};
      const mins=Math.round((sessions[idx2].end-sessions[idx2].start)/60000);
      writeToCurrentVisit(v,'timeSessions',sessions);
      ST.vehicles=ST.vehicles.map(x=>x.id===v.id?v:x);window.save();toast(`Clocked out — ${mins}m logged`);refreshDetail();
    };
    window.clockOut=function(){
      const sess2=(v.timeSessions||[]).find(s=>s.mechId===ST.role&&!s.end);
      if(sess2)window.clockOutSession(sess2.id);
    };
    window.deleteSession=function(sid){
      if(!confirm('Delete this session?'))return;
      writeToCurrentVisit(v,'timeSessions',(v.timeSessions||[]).filter(s=>s.id!==sid));
      ST.vehicles=ST.vehicles.map(x=>x.id===v.id?v:x);window.save();refreshDetail();
    };
  }




  const addRepair=r=>{const rep={...r,id:uid(),date:Date.now(),cost:parseFloat(r.cost)||0};writeToCurrentVisit(v,'repairs',[...(v.repairs||[]),rep]);save();};
  const delRepair=id=>{writeToCurrentVisit(v,'repairs',(v.repairs||[]).filter(r=>r.id!==id));save();};
  const addPhoto=imgData=>{writeToCurrentVisit(v,'photos',[...(v.photos||[]),imgData]);save();};
  const delPhoto=i=>{
    const entry=(v.photos||[])[i];
    const path=storagePath(entry);
    if(path) deleteFromStorage(path); // fire-and-forget
    writeToCurrentVisit(v,'photos',(v.photos||[]).filter((_,j)=>j!==i));
    save();
  };
  const addReceipt=r=>{writeToCurrentVisit(v,'receipts',[...(v.receipts||[]),r]);save();};
  const delReceipt=i=>{
    const entry=(v.receipts||[])[i];
    const path=storagePath(entry);
    if(path) deleteFromStorage(path); // fire-and-forget
    writeToCurrentVisit(v,'receipts',(v.receipts||[]).filter((_,j)=>j!==i));
    save();
  };

  const statuses=(v.statuses||[]).map(id=>SMAP[id]).filter(Boolean);
  const mech=v.assignedTo?getMMAP()[v.assignedTo]:null;
  const pri=v.priority?PMAP[v.priority]:null;
  const totalCost=(v.repairs||[]).reduce((a,r)=>a+Number(r.cost||0),0);

  const TABS=['overview','statuses','concerns','photos','repairs','receipts','timeclock','history','frazer'];

  setTopbar(`${v.year||''} ${v.make||''} ${v.model||''}`,
    `<button class="out-btn" onclick="ST.view='invoice';render()">🧾 Invoice</button>
     ${ST.masterPinUnlocked?`<button class="danger-btn" onclick="if(confirm('Delete this vehicle?')){ST.vehicles=ST.vehicles.filter(x=>x.id!=='${v.id}');save();toast('Removed');ST.view='dashboard';render()}">🗑</button>`:''}`);

  function refreshDetail(){
    const cur=ST.vehicles.find(x=>x.id===v.id)||v;
    Object.assign(v,cur);
    const tabContent=c.querySelector('#tab-content');
    if(tabContent) renderTabContent(tabContent);
    const badgeRow=c.querySelector('#status-badges');
    if(badgeRow) badgeRow.innerHTML=statusBadges(v);
    // Also refresh the tabs row so the 'active' class moves with the selected tab
    const tabsRow=c.querySelector('#detail-tabs');
    if(tabsRow) tabsRow.innerHTML=TABS.map(t=>`<button class="tab-btn${ST.activeTab===t?' active':''}" onclick="ST.activeTab='${t}';refreshDetail()">${(t||'').charAt(0).toUpperCase()+(t||'').slice(1)}</button>`).join('');
  }

  function statusBadges(veh){
    const sts=(veh.statuses||[]).map(id=>SMAP[id]).filter(Boolean);
    if(!sts.length)return`<span style="color:#555d73;font-size:13px">No status set — use Statuses tab</span>`;
    return sts.map(s=>`<span class="v-tag" style="font-size:12px;padding:4px 12px;background:${s.color}18;color:${s.color};border-color:${s.color}30">${s.icon} ${s.label}</span>`).join('');
  }

  c.innerHTML=`
  <div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:14px;flex-wrap:wrap">
    <button class="back-btn" onclick="ST.view=ST.role==='manager'?'dashboard':ST.role==='sales'?'salespipeline':ST.role==='detailer'?'detailer':'mypipeline';render()">← Back</button>
    <div style="flex:1;min-width:0">
      <div style="font-size:20px;font-weight:700;color:#fff;margin-bottom:3px">${v.year||''} ${v.make||''} ${v.model||''}</div>
      <div style="font-size:12px;color:#555d73;display:flex;gap:12px;flex-wrap:wrap">
        <span>Stock: <strong style="color:#9ca3af">${v.stockNumber||'—'}</strong></span>
        <span>VIN: <strong style="color:#9ca3af;font-family:'Courier New',Courier,monospace">${v.vin||'—'}</strong></span>
        <span>${v.color||''} · ${Number(v.mileage||0).toLocaleString()} mi</span>
        ${mech?`<span style="color:${mech.color}">${mech.icon} ${mech.name}</span>`:''}
        ${pri?`<span style="color:${pri.color}">${pri.icon} ${pri.label} priority</span>`:''}
      </div>
    </div>
  </div>
  <div id="status-badges" class="v-tags" style="margin-bottom:14px">${statusBadges(v)}</div>
  <div id="detail-tabs" class="tabs">${TABS.map(t=>`<button class="tab-btn${ST.activeTab===t?' active':''}" onclick="ST.activeTab='${t}';refreshDetail()">${(t||'').charAt(0).toUpperCase()+(t||'').slice(1)}</button>`).join('')}</div>
  <div id="tab-content"></div>`;

  window.refreshDetail=refreshDetail;

  function renderTabContent(el){
    el.innerHTML='';
    switch(ST.activeTab){
      case 'overview':  buildOverviewTab(el);break;
      case 'statuses':  buildStatusesTab(el);break;
      case 'concerns':  buildConcernsTab(el,v,save);break;
      case 'photos':    buildPhotosTab(el);break;
      case 'repairs':   buildRepairsTab(el);break;
      case 'receipts':  buildReceiptsTab(el);break;
      case 'frazer':    buildFrazerTab(el);break;
      case 'timeclock': buildTimeClockTab(el);break;
      case 'history':   buildHistoryTab(el);break;
    }
  }

  function buildOverviewTab(el){
    const _pc=(v.parts||[]).reduce((a,p)=>a+((parseFloat(p.cost)||0)*(parseInt(p.qty)||1)),0);
    const _lc=(v.laborLines||[]).reduce((a,l)=>a+((parseFloat(l.hours)||0)*(parseFloat(l.rate)||0)),0);
    const _rc=(v.repairs||[]).reduce((a,r)=>a+Number(r.cost||0),0);
    const cost=_pc+_lc+_rc;
    el.innerHTML=`
    ${(v.statuses||[]).includes('customer_appt')&&v.apptDate?`<div style="background:#0a1f28;border:1px solid #06b6d455;border-radius:12px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px"><span style="font-size:22px">📅</span><div><div style="font-size:11px;font-weight:600;color:#06b6d4;letter-spacing:.5px;margin-bottom:3px">APPOINTMENT</div><div style="font-size:15px;font-weight:700;color:#fff">${new Date(v.apptDate).toLocaleString([],{weekday:'short',month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'})}</div></div><button onclick="ST.activeTab='statuses';refreshDetail()" style="margin-left:auto;background:none;border:1px solid #06b6d455;color:#06b6d4;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer">Edit</button></div>`:''}
    <div class="ov-grid">
      <div class="ov-card"><div class="ov-label">Recon cost</div><div class="ov-val" style="color:${RED}">${fmt$(cost)}</div></div>
      <div class="ov-card"><div class="ov-label">Parts</div><div class="ov-val">${(v.parts||[]).length+(v.repairs||[]).length}</div></div>
      <div class="ov-card"><div class="ov-label">Labor lines</div><div class="ov-val">${(v.laborLines||[]).length}</div></div>
      <div class="ov-card"><div class="ov-label">Photos</div><div class="ov-val">${v.photos?.length||0}</div></div>
      <div class="ov-card"><div class="ov-label">Date added</div><div class="ov-val" style="font-size:13px">${fmtD(v.createdAt)}</div></div>
      <div class="ov-card"><div class="ov-label">Last updated</div><div class="ov-val" style="font-size:13px">${fmtD(v.updatedAt)}</div></div>
    </div>
    <div class="panel">
      <div class="panel-title">Assignment & priority</div>
      <div class="two-col">
        <div class="field"><label>Mechanic</label>
          <select id="ov-mech">
            <option value="">— Unassigned —</option>
            ${getMechs().map(m=>`<option value="${m.id}" ${v.assignedTo===m.id?'selected':''}>${m.icon} ${m.name}</option>`).join('')}
          </select>
        </div>
        <div class="field"><label>Priority</label>
          <select id="ov-pri">
            ${PRIS.map(p=>`<option value="${p.id}" ${(v.priority||'medium')===p.id?'selected':''}>${p.icon} ${p.label}</option>`).join('')}
          </select>
        </div>
      </div>
    </div>
    <div class="field"><label style="font-size:11px;font-weight:600;color:#555d73;display:block;margin-bottom:5px">Notes</label>
      <textarea id="ov-notes" style="background:#161921;border:1px solid #2a2f3f;border-radius:8px;padding:10px 13px;color:#e2e4ea;width:100%;resize:vertical;min-height:80px;font-family:inherit;font-size:14px"
        onblur="save({notes:this.value})" placeholder="Vehicle notes...">${v.notes||''}</textarea>
    </div>`;
    buildComments(el);
    // Wire selects with addEventListener so they save reliably on mobile
    const mechSel=el.querySelector('#ov-mech');
    const priSel=el.querySelector('#ov-pri');
    if(mechSel){
      mechSel.addEventListener('change',()=>{save({assignedTo:mechSel.value});});
    }
    if(priSel){
      priSel.addEventListener('change',()=>{save({priority:priSel.value});});
    }
  }

  function buildComments(el){
    const section=document.createElement('div');
    section.innerHTML=`<div style="font-size:11px;font-weight:600;color:#555d73;letter-spacing:1px;margin:18px 0 10px;text-transform:uppercase">Comments</div>
    <div id="comment-list">${(v.comments||[]).map(c=>`<div class="comment"><div class="comment-meta"><strong>${c.author}</strong> · ${fmtD(c.date)}</div><div class="comment-text">${c.text}</div></div>`).join('')}</div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <select id="c-author" style="width:150px;background:#161921;border:1px solid #2a2f3f;border-radius:8px;padding:9px 12px;color:#e2e4ea;font-size:13px">
        ${['Manager','Sales','Mechanic 1','Mechanic 2','Detailer','Ilya'].map(a=>`<option>${a}</option>`).join('')}
      </select>
      <input id="c-text" style="flex:1;background:#161921;border:1px solid #2a2f3f;border-radius:8px;padding:9px 13px;color:#e2e4ea;font-size:13px" placeholder="Add a comment...">
      <button class="btn-ghost" onclick="postComment()">Post</button>
    </div>`;
    el.appendChild(section);
    function postComment(){
      const text=document.getElementById('c-text')?.value.trim();
      if(!text)return;
      const author=document.getElementById('c-author')?.value||'Manager';
      writeToCurrentVisit(v,'comments',[...(v.comments||[]),{id:uid(),author,text,date:Date.now()}]);
      save();
      document.getElementById('c-text').value='';
      render();
    }
    window.postComment=postComment;
    section.querySelector('#c-text')?.addEventListener('keydown',e=>{if(e.key==='Enter')postComment();});
  }

  function buildStatusesTab(el){
    el.innerHTML=`<p style="color:#555d73;font-size:13px;margin-bottom:18px">A vehicle can have multiple active statuses simultaneously.</p>`;
    const groups=[
      {label:'💰 Sale status',group:'sale'},
      {label:'🚗 Vehicle source',group:'source'},
      {label:'🅿️ Lot status',group:'lot'},
      {label:'🔧 Work status',group:'work'},
      {label:'✅ Final stage',group:'finish'}
    ];
    groups.forEach(({label,group})=>{
      const div=document.createElement('div');div.style.marginBottom='20px';
      div.innerHTML=`<div style="font-size:10px;font-weight:600;color:#555d73;letter-spacing:1.5px;margin-bottom:10px;text-transform:uppercase">${label}</div>`;
      const row=document.createElement('div');row.style.cssText='display:flex;flex-wrap:wrap;gap:8px';
      ALL_STATUSES.filter(s=>s.group===group).forEach(s=>{
        const on=(v.statuses||[]).includes(s.id);
        const btn=makeTagBtn(`${s.icon} ${s.label} ${on?'✓':''}`,on,s.color);
        btn.style.cssText=on?`background:${s.color}22;color:${s.color};border-color:${s.color}55;padding:10px 15px;font-size:13px`:'padding:10px 15px;font-size:13px';
        btn.onclick=()=>toggleSt(s.id);
        row.appendChild(btn);
      });
      div.appendChild(row);el.appendChild(div);
    });

    // Customer appointment date/time picker
    if((v.statuses||[]).includes('customer_appt')){
      const apptDiv=document.createElement('div');
      apptDiv.style.cssText='background:#0a1f28;border:1px solid #06b6d455;border-radius:12px;padding:16px;margin-top:12px';
      const apptVal=v.apptDate||'';
      apptDiv.innerHTML=`<div style="font-size:12px;font-weight:600;color:#06b6d4;margin-bottom:10px;letter-spacing:.5px">📅 APPOINTMENT DATE & TIME</div>
        <button id="appt-pick-btn" data-val="${apptVal}"
          style="width:100%;background:#0d0f14;border:1px solid #06b6d455;border-radius:10px;padding:14px 16px;color:${apptVal?'#fff':'#374151'};font-size:14px;font-weight:${apptVal?'600':'400'};text-align:left;cursor:pointer;display:flex;align-items:center;gap:10px;transition:border-color .15s"
          onmouseover="this.style.borderColor='#06b6d4'" onmouseout="this.style.borderColor='#06b6d455'">
          <span style="font-size:20px">📅</span>
          <span>${apptVal ? new Date(apptVal).toLocaleString([], {weekday:'short',month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'}) : 'Tap to set appointment date & time'}</span>
          <span style="margin-left:auto;font-size:12px;color:#555d73">›</span>
        </button>
        ${apptVal?`<button id="appt-clear-btn" style="width:100%;margin-top:6px;background:none;border:none;color:#374151;font-size:12px;cursor:pointer;padding:4px">✕ Clear appointment</button>`:''}`;
      el.appendChild(apptDiv);
      // Wire calendar button now that DOM exists
      const pickBtn=document.getElementById('appt-pick-btn');
      if(pickBtn){
        pickBtn.addEventListener('click',()=>{

  function buildReceiptsTab(el){
    // Single hidden file input — accepts images and PDFs; no camera capture attribute
    // so the native picker lets user choose camera OR library (iOS + Android default)
    const fileInput=document.createElement('input');
    fileInput.type='file';
    fileInput.accept='image/*,application/pdf';
    fileInput.multiple=false; // one at a time, because extraction modal blocks UI per-file
    fileInput.style.display='none';
    fileInput.onchange=e=>{
      const f = e.target.files && e.target.files[0];
      if(f) handleReceiptFile(f);
      fileInput.value=''; // allow re-picking same file
    };
    el.appendChild(fileInput);

    // MAIN FLOW: upload to Storage → show modal → AI extract → confirm parts → done
    async function handleReceiptFile(file){
      const fileName = file.name || ('receipt.' + (file.type.includes('pdf') ? 'pdf' : 'jpg'));
      const isPdf = file.type === 'application/pdf' || fileName.toLowerCase().endsWith('.pdf');
      const isImage = !isPdf && (file.type.startsWith('image/') || /\.(jpe?g|png|gif|webp|heic|heif)$/i.test(fileName));

      if(!isPdf && !isImage){
        toast('Unsupported file type — use JPG, PNG, HEIC, or PDF','err');
        return;
      }

      toast('Uploading receipt…');
      try {
        // 1) Get the bytes we'll save (handle HEIC conversion + image compression)
        let uploadBlob;
        let uploadMime;
        let uploadExt;
        let aiDataUrl; // data URL we'll send to AI extraction

        if(isPdf){
          uploadBlob = file;
          uploadMime = 'application/pdf';
          uploadExt = 'pdf';
          aiDataUrl = await blobToDataUrl(file);
        } else {
          // Image path: convert HEIC if needed, then compress to <1600px JPEG
          let workingFile = file;
          if(isHeicFile(file)){
            toast('Converting iPhone photo…');
            try {
              workingFile = await heicToJpegBlob(file);
            } catch(e){
              throw new Error('HEIC conversion failed: ' + e.message);
            }
          }
          // Compress (also gives us a data URL for AI)
          aiDataUrl = await compressImage(workingFile, 1600, 0.85);
          uploadBlob = dataUrlToBlob(aiDataUrl);
          uploadMime = 'image/jpeg';
          uploadExt = 'jpg';
        }

        // 2) Upload to Firebase Storage (direct, no Firestore bloat)
        let receiptEntry;
        if(storage){
          try {
            const path = `shops/automotive_connection/vehicles/${v.id}/receipts/${uid()}.${uploadExt}`;
            const obj = await uploadToStorage(uploadBlob, path);
            receiptEntry = {...obj, name:fileName, date:Date.now()};
          } catch(upErr){
            console.warn('Storage upload failed, using inline:', upErr);
            receiptEntry = {name:fileName, data:aiDataUrl, date:Date.now()};
          }
        } else {
          receiptEntry = {name:fileName, data:aiDataUrl, date:Date.now()};
        }

        addReceipt(receiptEntry);
        toast('Receipt saved ✓');

        // 3) Kick off AI extraction — pop modal over current view
        openExtractionModal(v, fileName, aiDataUrl, isPdf);
      } catch(e){
        console.error('Receipt upload error:',e);
        toast('Upload failed: '+e.message,'err');
      }
    }

    // Add-receipt button (single CTA)
    const zone=document.createElement('div');zone.className='cam-zone';
    zone.innerHTML=`<div class="cam-icon" style="background:#1a1600"><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="3" y="2" width="16" height="18" rx="2.5" stroke="#f59e0b" stroke-width="1.5" fill="none"/><line x1="6" y1="7" x2="16" y2="7" stroke="#f59e0b" stroke-width="1.2"/><line x1="6" y1="11" x2="16" y2="11" stroke="#f59e0b" stroke-width="1.2"/><line x1="6" y1="15" x2="11" y2="15" stroke="#f59e0b" stroke-width="1.2"/></svg></div>
      <div class="cam-title" style="color:#fbbf24">+ Add receipt</div><div class="cam-sub">Photo, PDF, or image · AI reads parts automatically</div>`;
    zone.onclick=()=>fileInput.click();
    el.appendChild(zone);

    // List existing receipts
    (v.receipts||[]).forEach((r,i)=>{
      const row=document.createElement('div');row.className='receipt-row';
      const rName=receiptName(r);const rUrl=receiptUrl(r);const rDate=receiptDate(r);const isPdf=receiptIsPdf(r);
      row.innerHTML=`<span style="font-size:22px">${isPdf?'📄':'🖼'}</span>
        <div class="receipt-info"><div class="receipt-name">${rName}</div><div class="receipt-date">${fmtD(rDate)}</div></div>
        <a class="dl-link" href="${rUrl}" download="${rName}" target="_blank" rel="noopener">⬇ Download</a>`;
      if(ST.masterPinUnlocked){
        const del=document.createElement('button');del.className='del-btn';del.textContent='✕';
        del.onclick=()=>{if(confirm(`Delete "${rName}"?`)) delReceipt(i);};
        row.appendChild(del);
      }
      el.appendChild(row);
    });
  }

  // ═══════════════════════════════════════════════
  // RECEIPT EXTRACTION MODAL — AI reads parts, user edits before save
  // ═══════════════════════════════════════════════
  function openExtractionModal(vehicle, fileName, dataUrl, isPdf){
    const overlay=document.createElement('div');
    overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.90);z-index:9990;display:flex;flex-direction:column;padding:18px;overflow-y:auto';
    overlay.innerHTML=`
      <div style="max-width:560px;width:100%;margin:0 auto;background:#111318;border:1px solid #1e2230;border-radius:14px;overflow:hidden">
        <div style="padding:16px 18px;border-bottom:1px solid #1e2230;display:flex;align-items:center;gap:14px">
          <div style="flex:1;min-width:0">
            <div style="font-size:14px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">🧾 ${fileName}</div>
            <div id="ex-status" style="font-size:11px;color:#fbbf24;margin-top:3px">⏳ AI reading receipt…</div>
          </div>
          <button id="ex-close" style="background:transparent;border:1px solid #374151;color:#fff;font-size:13px;padding:7px 13px;border-radius:7px;cursor:pointer;flex-shrink:0">Close</button>
        </div>
        <div id="ex-body" style="padding:14px 16px;min-height:200px"></div>
      </div>`;
    document.body.appendChild(overlay);
    const cleanup=()=>overlay.remove();
    overlay.querySelector('#ex-close').onclick=cleanup;
    overlay.onclick=(e)=>{if(e.target===overlay) cleanup();};

    const setStatus=t=>{const s=overlay.querySelector('#ex-status'); if(s){s.textContent=t; s.style.color='#fbbf24';}};
    const setStatusOk=t=>{const s=overlay.querySelector('#ex-status'); if(s){s.textContent=t; s.style.color='#6ee7b7';}};
    const setStatusErr=t=>{const s=overlay.querySelector('#ex-status'); if(s){s.textContent=t; s.style.color='#f87171';}};

    scanReceiptWithAI(dataUrl).then(result=>{
      const body=overlay.querySelector('#ex-body');
      if(!body) return;

      if(!result){
        setStatusErr('AI extraction failed');
        body.innerHTML=`
          <div style="padding:20px;text-align:center;color:#8896a8;font-size:13px;line-height:1.6">
            Could not reach the AI. The receipt file is saved, but you'll need to add parts manually.
          </div>
          <button id="ex-done" style="width:100%;background:#1e2230;border:1px solid #374151;color:#fff;font-size:14px;font-weight:600;padding:12px;border-radius:9px;cursor:pointer">Done</button>`;
        overlay.querySelector('#ex-done').onclick=cleanup;
        return;
      }

      const items = result.items || [];
      const taxTotal = result.tax || 0;

      if(items.length===0){
        setStatusOk('No parts detected');
      } else {
        setStatusOk(`Found ${items.length} part${items.length!==1?'s':''}${taxTotal?` · tax $${taxTotal.toFixed(2)}`:''}`);
      }

      // Local working copy; user edits update this before save.
      // Distribute tax proportionally across items by subtotal weight.
      const subtotal = items.reduce((a,it)=>a + (Number(it.eachCost)||0) * (Number(it.quantity)||1), 0);
      const working = items.map((it, idx)=>{
        const each = Number(it.eachCost)||0;
        const qty = Number(it.quantity)||1;
        const lineTotal = each * qty;
        // Per-item tax share proportional to line total
        const taxShare = (subtotal > 0 && taxTotal > 0) ? (lineTotal / subtotal) * taxTotal : 0;
        // Each-cost after tax share (split evenly across qty)
        const eachWithTax = qty > 0 ? (lineTotal + taxShare) / qty : each;
        return {
          description: it.description || '',
          partNumber: it.partNumber || '',
          eachCost: eachWithTax, // includes proportional tax
          quantity: qty,
          pick: true,
          _id: 'ex-row-'+idx
        };
      });

      const renderRows = ()=>{
        const rowsDiv = overlay.querySelector('#ex-rows');
        if(!rowsDiv) return;
        rowsDiv.innerHTML = working.map((row,i)=>{
          const lineTotal = (Number(row.eachCost)||0) * (Number(row.quantity)||1);
          return `
          <div style="padding:11px;background:#0d0f14;border:1px solid ${row.pick?'#2a2f3f':'#1e2230'};border-radius:9px;margin-bottom:8px;opacity:${row.pick?'1':'0.5'}">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
              <input type="checkbox" data-ex-pick="${i}" ${row.pick?'checked':''} style="width:16px;height:16px;accent-color:#f59e0b;flex-shrink:0">
              <input type="text" data-ex-desc="${i}" value="${(row.description||'').replace(/"/g,'&quot;')}" placeholder="Description"
                style="flex:1;min-width:0;background:#0a0c10;border:1px solid #1e2230;border-radius:6px;padding:7px 9px;color:#e2e4ea;font-size:13px">
            </div>
            <div style="display:grid;grid-template-columns:auto 1fr 1fr 1fr;gap:8px;align-items:center;padding-left:26px">
              <span style="font-size:10px;color:#555d73;text-transform:uppercase;letter-spacing:.5px">Part #</span>
              <input type="text" data-ex-partnum="${i}" value="${(row.partNumber||'').replace(/"/g,'&quot;')}" placeholder="—"
                style="grid-column:2 / span 3;background:#0a0c10;border:1px solid #1e2230;border-radius:6px;padding:6px 9px;color:#9ca3af;font-size:12px;font-family:ui-monospace,monospace">
              <span style="font-size:10px;color:#555d73;text-transform:uppercase;letter-spacing:.5px">Each</span>
              <input type="number" step="0.01" min="0" data-ex-cost="${i}" value="${Number(row.eachCost||0).toFixed(2)}"
                style="background:#0a0c10;border:1px solid #1e2230;border-radius:6px;padding:6px 9px;color:#C8102E;font-size:13px;font-weight:600;text-align:right;font-family:ui-monospace,monospace">
              <span style="font-size:10px;color:#555d73;text-transform:uppercase;letter-spacing:.5px;text-align:center">×&nbsp;qty</span>
              <input type="number" step="1" min="1" data-ex-qty="${i}" value="${row.quantity||1}"
                style="background:#0a0c10;border:1px solid #1e2230;border-radius:6px;padding:6px 9px;color:#e2e4ea;font-size:13px;text-align:center;font-family:ui-monospace,monospace">
              <span style="font-size:10px;color:#555d73;text-transform:uppercase;letter-spacing:.5px;text-align:right">Line</span>
              <span data-ex-line="${i}" style="font-size:13px;font-weight:700;color:#fbbf24;text-align:right;padding:6px 9px;font-family:ui-monospace,monospace">$${lineTotal.toFixed(2)}</span>
            </div>
          </div>`;
        }).join('');

        // Wire up live updates
        overlay.querySelectorAll('[data-ex-pick]').forEach(cb=>{
          cb.onchange = (e)=>{
            const i = +cb.dataset.exPick;
            working[i].pick = cb.checked;
            renderRows(); // re-render to update opacity + row bg
            updateTotal();
          };
        });
        overlay.querySelectorAll('[data-ex-desc]').forEach(inp=>{
          inp.oninput = ()=>{ working[+inp.dataset.exDesc].description = inp.value; };
        });
        overlay.querySelectorAll('[data-ex-partnum]').forEach(inp=>{
          inp.oninput = ()=>{ working[+inp.dataset.exPartnum].partNumber = inp.value; };
        });
        overlay.querySelectorAll('[data-ex-cost]').forEach(inp=>{
          inp.oninput = ()=>{
            const i = +inp.dataset.exCost;
            working[i].eachCost = parseFloat(inp.value) || 0;
            const lineEl = overlay.querySelector(`[data-ex-line="${i}"]`);
            if(lineEl) lineEl.textContent = '$'+(working[i].eachCost * working[i].quantity).toFixed(2);
            updateTotal();
          };
        });
        overlay.querySelectorAll('[data-ex-qty]').forEach(inp=>{
          inp.oninput = ()=>{
            const i = +inp.dataset.exQty;
            const q = parseInt(inp.value) || 1;
            working[i].quantity = q > 0 ? q : 1;
            const lineEl = overlay.querySelector(`[data-ex-line="${i}"]`);
            if(lineEl) lineEl.textContent = '$'+(working[i].eachCost * working[i].quantity).toFixed(2);
            updateTotal();
          };
        });
      };

      const updateTotal = ()=>{
        const totalEl = overlay.querySelector('#ex-total');
        if(!totalEl) return;
        const total = working.filter(r=>r.pick).reduce((a,r)=>a + (Number(r.eachCost)||0) * (Number(r.quantity)||1), 0);
        const pickedCount = working.filter(r=>r.pick).length;
        totalEl.textContent = `${pickedCount} part${pickedCount!==1?'s':''} · $${total.toFixed(2)}`;
      };

      body.innerHTML = items.length ? `
        <div style="font-size:11px;color:#8896a8;letter-spacing:.4px;line-height:1.5;margin-bottom:10px">
          Each part's cost includes its share of tax. Edit any field below.
        </div>
        <div id="ex-rows"></div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 4px;margin-top:4px">
          <div style="font-size:11px;color:#555d73;text-transform:uppercase;letter-spacing:.6px">Selected total</div>
          <div id="ex-total" style="font-size:15px;font-weight:700;color:#fbbf24;font-family:ui-monospace,monospace">—</div>
        </div>
        <button id="ex-add" style="width:100%;background:#f59e0b;border:none;color:#000;font-size:14px;font-weight:700;padding:13px;border-radius:9px;cursor:pointer;margin-top:10px">✓ Add selected parts</button>
      ` : `
        <div style="padding:20px;text-align:center;color:#8896a8;font-size:13px;line-height:1.5">
          No auto parts detected in this receipt.<br>
          <span style="color:#555d73;font-size:11px">You can still confirm — the receipt file is saved.</span>
        </div>
        <button id="ex-add" style="width:100%;background:#1e2230;border:1px solid #374151;color:#fff;font-size:14px;font-weight:600;padding:12px;border-radius:9px;cursor:pointer">✓ Done</button>
      `;

      if(items.length){ renderRows(); updateTotal(); }

      overlay.querySelector('#ex-add').onclick=()=>{
        const picked = working.filter(r=>r.pick);
        if(picked.length > 0){
          const freshV = ST.vehicles.find(x=>x.id===vehicle.id);
          if(!freshV){
            toast('Vehicle no longer exists','err');
            cleanup();
            return;
          }
          const newParts=[...(freshV.parts||[])];
          picked.forEach(row=>{
            newParts.push({
              name: row.description || '',
              partNum: row.partNumber || '',
              cost: parseFloat(row.eachCost) || 0,
              qty: parseInt(row.quantity) || 1
            });
          });
          writeToCurrentVisit(freshV, 'parts', newParts);
          window.save();
          toast(`Added ${picked.length} part${picked.length!==1?'s':''} to ${freshV.year||''} ${freshV.make||''} ${freshV.model||''}`);
        }
        cleanup();
      };
    }).catch(e=>{
      console.error('Extraction error:',e);
      setStatusErr('Error: '+e.message);
      const body=overlay.querySelector('#ex-body');
      if(body){
        body.innerHTML=`
          <div style="padding:20px;text-align:center;color:#8896a8;font-size:13px;line-height:1.6">
            ${e.message}<br><br>The receipt file is saved, but no parts were extracted.
          </div>
          <button id="ex-done2" style="width:100%;background:#1e2230;border:1px solid #374151;color:#fff;font-size:14px;font-weight:600;padding:12px;border-radius:9px;cursor:pointer">Done</button>`;
        overlay.querySelector('#ex-done2').onclick=cleanup;
      }
    });
  }



  function buildFrazerTab(el){
    const repairs=v.repairs||[];
    const total=repairs.reduce((a,r)=>a+Number(r.cost||0),0);
    const byCat={};repairs.forEach(r=>{if(!byCat[r.category])byCat[r.category]=0;byCat[r.category]+=Number(r.cost||0);});
    const statLabels=(v.statuses||[]).map(id=>SMAP[id]?.label||id).join(', ');
    const lines=[`STOCK#: ${v.stockNumber}`,`VIN: ${v.vin}`,`YEAR: ${v.year}`,`MAKE: ${v.make}`,`MODEL: ${v.model}`,`COLOR: ${v.color||''}`,`MILEAGE: ${v.mileage||''}`,`STATUS: ${statLabels}`,'','--- RECON COSTS ---',...Object.entries(byCat).map(([cat,cost])=>`${cat.toUpperCase()}: ${fmt$(cost)}`),``,`TOTAL RECON: ${fmt$(total)}`,'','--- REPAIRS ---',...repairs.map(r=>`${r.description} | ${fmt$(r.cost)}${r.mechanic?` | ${r.mechanic}`:''}`)].join('\n');

    const table=document.createElement('div');table.className='panel';
    table.innerHTML=`<div class="panel-title">Frazer system data</div><div style="border:1px solid #1e2230;border-radius:9px;overflow:hidden;margin-bottom:14px">
      ${[['Stock #',v.stockNumber],['VIN',v.vin],['Year',v.year],['Make',v.make],['Model',v.model],['Color',v.color],['Mileage',v.mileage],['Status',statLabels],['Total recon',fmt$(total)]].map(([k,val])=>`
      <div class="frazer-row"><div class="frazer-key">${k}</div><div class="frazer-val">${val||'—'}</div>
      <button class="copy-btn" onclick="navigator.clipboard.writeText('${(val||'').replace(/'/g,"\\'")}');toast('Copied')">copy</button></div>`).join('')}
    </div>`;
    el.appendChild(table);

    const pre=document.createElement('pre');pre.className='export-pre';pre.textContent=lines;el.appendChild(pre);
    const copyBtn=document.createElement('button');
    copyBtn.className='btn-red';copyBtn.style.cssText='padding:10px 20px;border-radius:8px;font-size:13px;margin-bottom:20px';
    copyBtn.textContent='📋 Copy all to clipboard';
    copyBtn.onclick=()=>navigator.clipboard.writeText(lines).then(()=>toast('Copied!'));
    el.appendChild(copyBtn);
  }

  renderTabContent(c.querySelector('#tab-content'));
}

    <input type="file" id="cam-input" accept="image/*" capture="environment" multiple style="display:none" onchange="camPhotoCapture(this)">
    <input type="file" id="lib-input" accept="image/*" multiple style="display:none" onchange="camPhotoCapture(this)">
    <button class="btn-ghost" style="width:100%;padding:10px;border-radius:8px;font-size:13px;margin-bottom:14px" onclick="document.getElementById('lib-input').click()">📁 Choose from photo library</button>
    <div class="photo-grid" id="cam-photo-grid"></div>
    <div id="cam-link-note" style="font-size:12px;color:#555d73;margin-top:8px">Photos captured here can be attached to a vehicle from the vehicle detail screen.</div>
  </div>
  <div class="panel">
    <div class="panel-title">Scan receipt</div>
    <div class="cam-zone" id="cam-receipt-zone" style="border-color:#3d3000">
      <div class="cam-icon" style="background:#1a1600"><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="3" y="2" width="16" height="18" rx="2.5" stroke="#f59e0b" stroke-width="1.5" fill="none"/><line x1="6" y1="7" x2="16" y2="7" stroke="#f59e0b" stroke-width="1.2"/><line x1="6" y1="11" x2="16" y2="11" stroke="#f59e0b" stroke-width="1.2"/><line x1="6" y1="15" x2="11" y2="15" stroke="#f59e0b" stroke-width="1.2"/></svg></div>
      <div class="cam-title" style="color:#fbbf24">Scan receipt with camera</div>
      <div class="cam-sub">Point at paper receipt — auto-captures edges</div>
    </div>
    <input type="file" id="receipt-cam" accept="image/*,application/pdf" capture="environment" style="display:none">
    <input type="file" id="receipt-file" accept="image/*,application/pdf" multiple style="display:none">
    <button class="btn-ghost" style="width:100%;padding:10px;border-radius:8px;font-size:13px;margin-bottom:8px" onclick="document.getElementById('receipt-file').click()">📄 Upload PDF or image file</button>
    <div style="font-size:12px;color:#555d73">Receipts are saved directly to vehicles from the vehicle detail → Receipts tab.</div>
  </div>
  </div>`;

  c.querySelector('#cam-photo-zone').onclick=()=>document.getElementById('cam-input').click();
  c.querySelector('#cam-receipt-zone').onclick=()=>document.getElementById('receipt-cam').click();

  window.camPhotoCapture=function(input){
    const grid=document.getElementById('cam-photo-grid');
    if(!grid)return;
    Array.from(input.files).forEach(file=>{
      const rd=new FileReader();
      rd.onload=()=>{
        const thumb=document.createElement('div');thumb.className='photo-thumb';
        const img=document.createElement('img');img.src=rd.result;
        thumb.appendChild(img);grid.prepend(thumb);
      };
      rd.readAsDataURL(file);
    });
  };
}
