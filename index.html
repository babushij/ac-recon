<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AC Recon — Staff</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#080a0e;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:32px 20px}
.logo{font-size:28px;font-weight:800;letter-spacing:5px;color:#fff;text-transform:uppercase;margin-bottom:4px}
.sub{font-size:10px;color:#3d5068;letter-spacing:3px;text-transform:uppercase;margin-bottom:48px}
.card{width:100%;max-width:320px;background:#0e1117;border:1px solid #1a2035;border-radius:6px;overflow:hidden;border-top:2px solid #C8102E}
.card-title{padding:16px 20px;font-size:10px;font-weight:700;color:#3d5068;letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid #1a2035}
.launch-btn{display:flex;justify-content:space-between;align-items:center;width:100%;background:transparent;border:none;border-bottom:1px solid #1a2035;padding:16px 20px;color:#e8eaf2;cursor:pointer;transition:background .1s;text-decoration:none}
.launch-btn:last-child{border-bottom:none}
.launch-btn:hover{background:#131824}
.btn-label{font-size:14px;font-weight:600;color:#fff}
.btn-arrow{color:#3d5068;font-size:13px}
.note{font-size:11px;color:#2a3a50;margin-top:24px;letter-spacing:.5px}
</style>
</head>
<body>
  <div class="logo">Automotive Connection</div>
  <div class="sub">Vehicle Recon System</div>
  <div class="card">
    <div class="card-title">Select your role</div>
    <a href="recon-app.html" class="launch-btn">
      <span class="btn-label">Staff Login</span>
      <span class="btn-arrow">→</span>
    </a>
  </div>
  <div class="note">5210 Dixie HWY · Fairfield, OH · 513-858-6555</div>
</body>
</html>
