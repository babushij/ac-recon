// ═══════════════════════════════════════════════
// COMPLETED VEHICLES
// ═══════════════════════════════════════════════
function renderCompleted(c){
  const isManager=ST.role==='manager';
  const mechId=isManager?null:ST.role;
  const mech=mechId?getMMAP()[mechId]:null;
  setTopbar(isManager?'Completed vehicles':`${mech?.name||'My'} — Completed`,'');

  if(!ST.compPeriod) ST.compPeriod='week';
  if(!ST.compBooked) ST.compBooked='all';
  // Reset if role-incompatible filter is active
  const managerOnlyFilters=['booked','unbooked'];
  const mechOnlyFilters=['receipts_in','receipts_out'];
  if(isManager&&mechOnlyFilters.includes(ST.compBooked)) ST.compBooked='all';
  if(!isManager&&managerOnlyFilters.includes(ST.compBooked)) ST.compBooked='all';

  const now=new Date();
  const sod=new Date();sod.setHours(0,0,0,0);
  const todayStart=sod.getTime();
  const weekStart=todayStart-sod.getDay()*86400000;
  const monthStart=new Date(now.getFullYear(),now.getMonth(),1).getTime();
  const yearStart=new Date(now.getFullYear(),0,1).getTime();

  function periodStart(p){
    if(p==='today') return todayStart;
    if(p==='week')  return weekStart;
    if(p==='month') return monthStart;
    if(p==='year')  return yearStart;
    return 0; // all time
  }

  const PERIODS=[
    {id:'today',label:'Today'},
    {id:'week', label:'This Week'},
    {id:'month',label:'This Month'},
    {id:'year', label:'YTD'},
    {id:'all',  label:'All Time'},
  ];

  // A vehicle is "completed" if it has work_complete, cleaning, or sale status
  const COMPLETE_STATUSES=['work_complete','cleaning','sale','sold'];

  const cutoff=periodStart(ST.compPeriod);
  let vehicles=ST.vehicles.filter(v=>{
    const sts=v.statuses||[];
    const isComplete=COMPLETE_STATUSES.some(s=>sts.includes(s));
    if(!isComplete) return false;
    if(mechId&&v.assignedTo!==mechId) return false;
    if(v.updatedAt<cutoff) return false;
    return true;
  });

  if(isManager&&ST.compBooked==='booked')   vehicles=vehicles.filter(v=>(v.statuses||[]).includes('booked'));
  if(isManager&&ST.compBooked==='unbooked') vehicles=vehicles.filter(v=>!(v.statuses||[]).includes('booked'));
  if(!isManager&&ST.compBooked==='receipts_in') vehicles=vehicles.filter(v=>(v.statuses||[]).includes('receipts_in'));
  if(!isManager&&ST.compBooked==='receipts_out') vehicles=vehicles.filter(v=>!(v.statuses||[]).includes('receipts_in'));

  vehicles.sort((a,b)=>b.updatedAt-a.updatedAt);

  let html='';

  // Period selector
  html+=`<div style="display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px">
    ${PERIODS.map(p=>`<button onclick="ST.compPeriod='${p.id}';renderCompleted(document.getElementById('content'))"
      style="flex-shrink:0;padding:7px 13px;border-radius:20px;border:1px solid ${ST.compPeriod===p.id?'#C8102E':'#2a2f3f'};background:${ST.compPeriod===p.id?'#C8102E22':'#111318'};color:${ST.compPeriod===p.id?'#C8102E':'#555d73'};font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap">${p.label}</button>`).join('')}
  </div>`;

  // Booked / receipt filter row
  if(isManager){
    html+=`<div style="display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap">
      ${[{id:'all',label:'All'},{ id:'unbooked',label:'⚠️ Not booked',color:'#f87171'},{id:'booked',label:'📒 Booked',color:'#818cf8'}].map(opt=>`
      <button onclick="ST.compBooked='${opt.id}';renderCompleted(document.getElementById('content'))"
        style="padding:7px 14px;border-radius:20px;border:1px solid ${ST.compBooked===opt.id?'#C8102E':'#2a2f3f'};background:${ST.compBooked===opt.id?'#C8102E22':'#111318'};color:${ST.compBooked===opt.id?'#C8102E':'#555d73'};font-size:12px;font-weight:600;cursor:pointer">${opt.label}</button>`).join('')}
    </div>`;
  } else {
    html+=`<div style="display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap">
      ${[{id:'all',label:'All'},{id:'receipts_out',label:'⚠️ Receipts needed',color:'#f87171'},{id:'receipts_in',label:'🧾 Receipts entered',color:'#34d399'}].map(opt=>`
      <button onclick="ST.compBooked='${opt.id}';renderCompleted(document.getElementById('content'))"
        style="padding:7px 14px;border-radius:20px;border:1px solid ${ST.compBooked===opt.id?'#C8102E':'#2a2f3f'};background:${ST.compBooked===opt.id?'#C8102E22':'#111318'};color:${ST.compBooked===opt.id?'#C8102E':'#555d73'};font-size:12px;font-weight:600;cursor:pointer">${opt.label}</button>`).join('')}
    </div>`;
  }

  // Summary row
  const bookedCount=vehicles.filter(v=>(v.statuses||[]).includes('booked')).length;
  const receiptsCount=vehicles.filter(v=>(v.statuses||[]).includes('receipts_in')).length;
  html+=`<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
    <div style="background:#111318;border:1px solid #1e2230;border-radius:9px;padding:10px 14px;flex:1;min-width:80px;text-align:center">
      <div style="font-size:10px;color:#374151;font-weight:600;margin-bottom:3px">COMPLETED</div>
      <div style="font-size:20px;font-weight:700;color:#fff">${vehicles.length}</div>
    </div>
    <div style="background:#111318;border:1px solid ${isManager?'#818cf833':'#34d39933'};border-radius:9px;padding:10px 14px;flex:1;min-width:80px;text-align:center">
      <div style="font-size:10px;color:${isManager?'#818cf8':'#34d399'};font-weight:600;margin-bottom:3px">${isManager?'📒 BOOKED':'🧾 RECEIPTS IN'}</div>
      <div style="font-size:20px;font-weight:700;color:${isManager?'#818cf8':'#34d399'}">${isManager?bookedCount:receiptsCount}</div>
    </div>
    <div style="background:#111318;border:1px solid #f8718133;border-radius:9px;padding:10px 14px;flex:1;min-width:80px;text-align:center">
      <div style="font-size:10px;color:#f87171;font-weight:600;margin-bottom:3px">⚠️ ${isManager?'NOT BOOKED':'NEEDED'}</div>
      <div style="font-size:20px;font-weight:700;color:#f87171">${isManager?vehicles.length-bookedCount:vehicles.length-receiptsCount}</div>
    </div>
  </div>`;

  if(!vehicles.length){
    html+=`<div class="empty"><div class="empty-icon">✅</div><div class="empty-msg">No completed vehicles</div><div class="empty-sub">Vehicles marked work complete will appear here</div></div>`;
    c.innerHTML=html;return;
  }

  // Vehicle list
  vehicles.forEach(v=>{
    const sts=v.statuses||[];
    const hasReceipts=sts.includes('receipts_in');
    const isBooked=sts.includes('booked');
    const assignedMech=v.assignedTo?getMMAP()[v.assignedTo]:null;
    const pc=(v.parts||[]).reduce((a,p)=>a+((parseFloat(p.cost)||0)*(parseInt(p.qty)||1)),0);
    const lc=(v.laborLines||[]).reduce((a,l)=>a+((parseFloat(l.hours)||0)*(parseFloat(l.rate)||0)),0);
    const rc=(v.repairs||[]).reduce((a,r)=>a+Number(r.cost||0),0);
    const cost=pc+lc+rc;
    const totalHrs=(v.timeSessions||[]).filter(s=>s.end).reduce((a,s)=>a+((s.end-s.start)/3600000),0);

    html+=`<div style="background:#111318;border:1px solid ${isBooked?'#818cf844':hasReceipts?'#34d39933':'#1e2230'};border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer" onclick="ST.selectedId='${v.id}';ST.view='detail';ST.activeTab='repairs';render()">
      <div style="display:flex;align-items:flex-start;gap:12px">
        ${v.photos?.[0]?`<img src="${photoUrl(v.photos[0])}" style="width:56px;height:56px;object-fit:cover;border-radius:8px;flex-shrink:0">`:
          `<div style="width:56px;height:56px;background:#1e2230;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#374151;font-size:18px">🚗</div>`}
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:700;color:#fff;margin-bottom:2px">${v.year||''} ${v.make||''} ${v.model||''}</div>
          <div style="font-size:11px;color:#555d73;margin-bottom:6px">#${v.stockNumber||'—'} · ...${(v.vin||'------').slice(-6)}${assignedMech?` · ${assignedMech.icon} ${assignedMech.name}`:''}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
            ${isBooked?'<span style="font-size:11px;background:#818cf822;color:#818cf8;border:1px solid #818cf833;padding:2px 8px;border-radius:20px;font-weight:600">📒 Booked</span>':'<span style="font-size:11px;background:#f8717122;color:#f87171;border:1px solid #f8717133;padding:2px 8px;border-radius:20px;font-weight:600">⚠️ Not booked</span>'}
            ${hasReceipts?'<span style="font-size:11px;background:#34d39922;color:#34d399;border:1px solid #34d39933;padding:2px 8px;border-radius:20px;font-weight:600">🧾 Receipts in</span>':'<span style="font-size:11px;background:#f8717122;color:#f87171;border:1px solid #f8717133;padding:2px 8px;border-radius:20px;font-weight:600">📋 Receipts needed</span>'}
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div style="font-size:13px;font-weight:700;color:#C8102E">${fmt$(cost)}</div>
            <div style="font-size:11px;color:#555d73">${totalHrs.toFixed(1)}h labor · ${fmtD(v.updatedAt)}</div>
          </div>
        </div>
      </div>
      <div style="display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid #1e2230">
        ${isManager?`<button onclick="event.stopPropagation();const v2=ST.vehicles.find(x=>x.id==='${v.id}');if(!v2)return;const sts2=v2.statuses||[];v2.statuses=sts2.includes('booked')?sts2.filter(s=>s!=='booked'):[...sts2,'booked'];v2.updatedAt=Date.now();ST.vehicles=ST.vehicles.map(x=>x.id===v2.id?v2:x);save();renderCompleted(document.getElementById('content'))"
          style="flex:1;padding:9px;border-radius:8px;border:1px solid ${isBooked?'#818cf8':'#2a2f3f'};background:${isBooked?'#818cf822':'transparent'};color:${isBooked?'#818cf8':'#555d73'};font-size:12px;font-weight:700;cursor:pointer">
          ${isBooked?'📒 Booked ✓':'📒 Mark booked'}
        </button>`:
        `<button onclick="event.stopPropagation();const v2=ST.vehicles.find(x=>x.id==='${v.id}');if(!v2)return;const sts2=v2.statuses||[];v2.statuses=sts2.includes('receipts_in')?sts2.filter(s=>s!=='receipts_in'):[...sts2,'receipts_in'];v2.updatedAt=Date.now();ST.vehicles=ST.vehicles.map(x=>x.id===v2.id?v2:x);save();renderCompleted(document.getElementById('content'))"
          style="flex:1;padding:9px;border-radius:8px;border:1px solid ${hasReceipts?'#34d399':'#2a2f3f'};background:${hasReceipts?'#34d39922':'transparent'};color:${hasReceipts?'#34d399':'#555d73'};font-size:12px;font-weight:700;cursor:pointer">
          ${hasReceipts?'🧾 Receipts in ✓':'🧾 Mark receipts in'}
        </button>`}
        <button onclick="event.stopPropagation();ST.selectedId='${v.id}';ST.view='detail';ST.activeTab='repairs';render()"
          style="padding:9px 14px;border-radius:8px;border:1px solid #2a2f3f;background:transparent;color:#9ca3af;font-size:12px;cursor:pointer">Details →</button>
      </div>
    </div>`;
  });

  c.innerHTML=html;
}

function renderHistory(c){
  setTopbar('History','');
  let html=`<div class="search-wrap"><svg class="search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="#555d73" stroke-width="1.4"/><line x1="10" y1="10" x2="13" y2="13" stroke="#555d73" stroke-width="1.5" stroke-linecap="round"/></svg><input id="hs-q" value="${ST.searchQuery}" placeholder="Search by last 6 of VIN, stock #, make, model, year..."><button class="search-clear" onclick="ST.searchQuery='';render()">✕</button></div>`;
  const q=ST.searchQuery.trim().toLowerCase();
  const filtered=q?ST.vehicles.filter(v=>
    (v.vin||'').slice(-6).toLowerCase().includes(q)||(v.stockNumber||'').toLowerCase().includes(q)||
    (v.make||'').toLowerCase().includes(q)||(v.model||'').toLowerCase().includes(q)||(v.year||'').toString().includes(q)
  ):ST.vehicles;
  const sorted=[...filtered].sort((a,b)=>b.updatedAt-a.updatedAt);
  html+=`<div style="font-size:12px;color:#555d73;margin-bottom:12px">${sorted.length} vehicle${sorted.length!==1?'s':''}</div>`;
  html+=`<div style="background:#111318;border:1px solid #1e2230;border-radius:10px;overflow:hidden">
    <div class="hist-hdr" style="color:#555d73;font-size:10px;font-weight:600;letter-spacing:.5px">
      <div>Vehicle</div><div>Stock #</div><div>Last 6 VIN</div><div>Statuses</div><div>Recon $</div><div>Updated</div><div></div>
    </div>`;
  sorted.forEach(v=>{
    const sts=(v.statuses||[]).map(id=>SMAP[id]).filter(Boolean);
    const cost=(v.repairs||[]).reduce((a,r)=>a+Number(r.cost||0),0);
    html+=`<div class="hist-row" data-vid="${v.id}" style="cursor:pointer">
      <div style="font-weight:600;color:#e2e4ea;font-size:13px">${v.year||''} ${v.make||''} ${v.model||''}</div>
      <div style="color:#9ca3af;font-size:12px">${v.stockNumber||'—'}</div>
      <div><code style="background:#161921;padding:2px 6px;border-radius:4px;font-size:11px;font-family:'Courier New',Courier,monospace;color:#9ca3af">${(v.vin||'------').slice(-6)}</code></div>
      <div style="display:flex;flex-wrap:wrap;gap:3px">${sts.map(s=>`<span style="font-size:10px;background:${s.color}18;color:${s.color};border-radius:6px;padding:1px 6px;font-weight:600">${s.icon} ${s.label}</span>`).join('')}</div>
      <div style="color:${RED};font-weight:700;font-size:13px">${fmt$(cost)}</div>
      <div style="color:#555d73;font-size:12px">${fmtD(v.updatedAt)}</div>
      <div><button class="btn-ghost" style="font-size:11px;padding:5px 10px">View →</button></div>
    </div>`;
  });
  html+=`</div>`;
  if(!sorted.length) html+=`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-msg">No vehicles found</div></div>`;
  c.innerHTML=html;
  c.querySelectorAll('.hist-row[data-vid]').forEach(row=>{
    row.onclick=()=>{ST.selectedId=row.dataset.vid;ST.view='detail';ST.activeTab='overview';render()};
  });
  const si=c.querySelector('#hs-q');
  if(si){si.oninput=e=>{ST.searchQuery=e.target.value;renderHistory(c)}}
}

// ═══════════════════════════════════════════════
// MECHANIC PIPELINE
// ═══════════════════════════════════════════════
function renderMechPipeline(c){
  const mechId=ST.role==='manager'?null:ST.role;
  const mech=mechId?getMMAP()[mechId]:null;
  setTopbar(mech?`${mech.icon} ${mech.name} — Pipeline`:'All Mechanic Pipelines','');

  const DONE_STATUSES=['cleaning','sale','work_complete','sold','receipts_in','booked'];

  function vCost(v){
    const pc=(v.parts||[]).reduce((a,p)=>a+((parseFloat(p.cost)||0)*(parseInt(p.qty)||1)),0);
    const lc=(v.laborLines||[]).reduce((a,l)=>a+((parseFloat(l.hours)||0)*(parseFloat(l.rate)||0)),0);
    const rc=(v.repairs||[]).reduce((a,r)=>a+Number(r.cost||0),0);
    return pc+lc+rc;
  }

  function cardHTML(v, cardMechId){
    const sts=(v.statuses||[]).map(id=>SMAP[id]).filter(Boolean);
    const cost=vCost(v);
    const pri=PMAP[v.priority||'medium'];
    const assignedMech=v.assignedTo?getMMAP()[v.assignedTo]:null;
    const activeS=(v.timeSessions||[]).find(s=>s.mechId===cardMechId&&!s.end);
    let clockBtn='';
    if(cardMechId){
      if(activeS){
        const em=Math.round((Date.now()-activeS.start)/60000);
        const eStr=em>=60?Math.floor(em/60)+'h '+em%60+'m':em+'m';
        clockBtn=`<button class="pipe-clockout-btn" data-sessid="${activeS.id}" data-vid="${v.id}" style="width:100%;background:#0d2a0d;border:1.5px solid #166534;color:#4ade80;border-radius:8px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px">⏹ CLOCK OUT <span style="font-size:11px;opacity:.75">${eStr}</span></button>`;
      } else {
        const activeCnt=ST.vehicles.filter(vv=>(vv.timeSessions||[]).some(s=>s.mechId===cardMechId&&!s.end)).length;
        clockBtn=activeCnt>=4
          ?`<div style="text-align:center;font-size:11px;color:#f87171;padding:8px;background:#2a0d0d;border-radius:7px">Max 4 cars — clock out first</div>`
          :`<button class="pipe-clockin-btn" data-vid="${v.id}" data-mechid="${cardMechId}" style="width:100%;background:#C8102E;border:none;color:#fff;border-radius:8px;padding:10px;font-size:13px;font-weight:700;cursor:pointer">▶ CLOCK IN</button>`;
      }
    }
    return`<div class="vehicle-card-grid" data-vid="${v.id}">
      ${v.photos?.[0]?`<div class="vcg-img"><img src="${photoUrl(v.photos[0])}" loading="lazy" style="width:100%;height:100%;object-fit:cover"></div>`:`<div class="vcg-img" style="display:flex;align-items:center;justify-content:center;color:#374151;font-size:12px">No photo</div>`}
      <div class="vcg-body">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
          <div style="font-size:14px;font-weight:600;color:#fff;flex:1;min-width:0">${v.year||''} ${v.make||''} ${v.model||''}</div>
          <span class="v-pri" style="background:${pri.color}18;color:${pri.color};font-size:10px;flex-shrink:0">${pri.icon} ${pri.label}</span>
        </div>
        <div style="font-size:11px;color:#555d73;margin-bottom:6px">#${v.stockNumber||'—'} · ...${(v.vin||'------').slice(-6)}${!mechId?` · <span style="color:${assignedMech?assignedMech.color:'#374151'}">${assignedMech?assignedMech.icon+' '+assignedMech.name:'— Unassigned'}</span>`:''}</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">
          ${(v.statuses||[]).map(id=>SMAP[id]).filter(Boolean).map(s=>`<span class="v-tag" style="background:${s.color}22;color:${s.color};border:1px solid ${s.color}55">${s.icon} ${s.label}</span>`).join('')||'<span style="font-size:10px;color:#374151">No status set</span>'}
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span style="font-size:13px;font-weight:700;color:${RED}">${fmt$(cost)}</span>
          <button class="btn-ghost" style="font-size:11px;padding:5px 10px" data-vid="${v.id}">Details →</button>
        </div>
        ${clockBtn}
      </div>
    </div>`;
  }

  // ── GROUP DEFINITIONS for mechanic view ──
  const GROUPS=[
    {
      id:'priority',
      label:null, // rendered by priority sub-groups
      filter:v=>{
        const sts=v.statuses||[];
        return !sts.some(s=>['parts','body_daniel','body_jose','outside_shop',...DONE_STATUSES].includes(s));
      }
    },
    {id:'parts',     label:'⏳ Waiting on parts',  color:'#f59e0b', filter:v=>(v.statuses||[]).includes('parts')&&!DONE_STATUSES.some(s=>(v.statuses||[]).includes(s))},
    {id:'bodyshop',  label:'🏠 At body shop',       color:'#ec4899', filter:v=>((v.statuses||[]).includes('body_daniel')||(v.statuses||[]).includes('body_jose'))&&!DONE_STATUSES.some(s=>(v.statuses||[]).includes(s))},
    {id:'outside',   label:'🏭 At outside shop',    color:'#a78bfa', filter:v=>(v.statuses||[]).includes('outside_shop')&&!DONE_STATUSES.some(s=>(v.statuses||[]).includes(s))},
    {id:'done',      label:'✔️ Recon complete',      color:'#22c55e', filter:v=>DONE_STATUSES.some(s=>(v.statuses||[]).includes(s))},
    {id:'receipts',  label:'🧾 Receipts needed',    color:'#f87171', filter:v=>DONE_STATUSES.some(s=>(v.statuses||[]).includes(s))&&!(v.statuses||[]).includes('receipts_in')},
  ];

  let html='';

  // ── SINGLE MECHANIC VIEW ──
  if(mechId){
    const mine=ST.vehicles.filter(v=>v.assignedTo===mechId);

    html+=`<div class="mechanic-header">
      <div class="mech-avatar" style="background:${mech.color}22;font-size:24px">${mech.icon}</div>
      <div>
        <div style="font-size:16px;font-weight:600;color:#fff">${mech.name}</div>
        <div style="font-size:13px;color:#9ca3af">${mine.length} assigned · ${mine.filter(v=>v.priority==='high').length} high priority</div>
      </div>
    </div>`;

    if(!mine.length){
      c.innerHTML=html+`<div class="empty"><div class="empty-icon">✅</div><div class="empty-msg">No vehicles assigned</div><div class="empty-sub">Manager will assign vehicles</div></div>`;
      return;
    }

    // ── Priority group (active work) ──
    const activeVehicles=mine.filter(GROUPS[0].filter);
    if(activeVehicles.length){
      // Sub-group by priority
      [
        {id:'high',   label:'🔴 High priority',  color:'#ef4444'},
        {id:'medium', label:'🟡 Medium priority', color:'#f59e0b'},
        {id:'low',    label:'⚫ Low priority',    color:'#6b7280'},
      ].forEach(pri=>{
        const grp=activeVehicles.filter(v=>(v.priority||'medium')===pri.id);
        if(!grp.length)return;
        html+=`<div class="priority-section">
          <div class="pri-hdr">
            <span style="font-size:14px">${pri.label.split(' ')[0]}</span>
            <span style="color:${pri.color}">${pri.label.slice(3)}</span>
            <span style="margin-left:auto;color:#555d73;font-size:12px">${grp.length}</span>
          </div>
          <div class="grid-cards">${grp.map(v=>cardHTML(v,mechId)).join('')}</div>
        </div>`;
      });
    }

    // ── Waiting on parts ──
    const partsVs=mine.filter(GROUPS[1].filter);
    if(partsVs.length){
      html+=`<div style="margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:8px;padding:8px 0;margin-bottom:8px;border-bottom:2px solid #f59e0b33">
          <span style="font-size:15px">⏳</span>
          <span style="font-size:13px;font-weight:700;color:#f59e0b">Waiting on parts</span>
          <span style="margin-left:auto;font-size:11px;color:#555d73">${partsVs.length}</span>
        </div>
        <div class="grid-cards">${partsVs.map(v=>cardHTML(v,mechId)).join('')}</div>
      </div>`;
    }

    // ── At body shop ──
    const bodyVs=mine.filter(GROUPS[2].filter);
    if(bodyVs.length){
      html+=`<div style="margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:8px;padding:8px 0;margin-bottom:8px;border-bottom:2px solid #ec4899  33">
          <span style="font-size:15px">🏠</span>
          <span style="font-size:13px;font-weight:700;color:#ec4899">At body shop</span>
          <span style="margin-left:auto;font-size:11px;color:#555d73">${bodyVs.length}</span>
        </div>
        <div class="grid-cards">${bodyVs.map(v=>cardHTML(v,mechId)).join('')}</div>
      </div>`;
    }

    // ── At outside shop ──
    const outsideVs=mine.filter(GROUPS[3].filter);
    if(outsideVs.length){
      html+=`<div style="margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:8px;padding:8px 0;margin-bottom:8px;border-bottom:2px solid #a78bfa33">
          <span style="font-size:15px">🏭</span>
          <span style="font-size:13px;font-weight:700;color:#a78bfa">At outside shop</span>
          <span style="margin-left:auto;font-size:11px;color:#555d73">${outsideVs.length}</span>
        </div>
        <div class="grid-cards">${outsideVs.map(v=>cardHTML(v,mechId)).join('')}</div>
      </div>`;
    }

    // ── Recon complete ──
    const doneVs=mine.filter(GROUPS[4].filter);
    if(doneVs.length){
      html+=`<div style="margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:8px;padding:8px 0;margin-bottom:8px;border-bottom:2px solid #22c55e33">
          <span style="font-size:15px">✔️</span>
          <span style="font-size:13px;font-weight:700;color:#22c55e">Recon complete</span>
          <span style="margin-left:auto;font-size:11px;color:#555d73">${doneVs.length}</span>
        </div>
        <div class="grid-cards">${doneVs.map(v=>cardHTML(v,mechId)).join('')}</div>
      </div>`;
    }

    // ── Receipts needed (subset of done) ──
    const receiptVs=mine.filter(GROUPS[5].filter);
    if(receiptVs.length){
      html+=`<div style="margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:8px;padding:8px 0;margin-bottom:8px;border-bottom:2px solid #f8717133">
          <span style="font-size:15px">🧾</span>
          <span style="font-size:13px;font-weight:700;color:#f87171">Receipts needed</span>
          <span style="margin-left:auto;font-size:11px;color:#555d73">${receiptVs.length}</span>
        </div>
        <div class="grid-cards">${receiptVs.map(v=>cardHTML(v,mechId)).join('')}</div>
      </div>`;
    }

    if(!mine.length) html+=`<div class="empty"><div class="empty-icon">✅</div><div class="empty-msg">Pipeline is clear</div></div>`;

  } else {
    // ── MANAGER VIEW — all mechanics separated ──
    const mechs=getMechs();
    const unassigned=ST.vehicles.filter(v=>!v.assignedTo);

    mechs.forEach(m=>{
      const mvs=ST.vehicles.filter(v=>v.assignedTo===m.id);
      html+=`<div style="margin-bottom:20px">
        <div style="display:flex;align-items:center;gap:10px;padding:10px 0;margin-bottom:10px;border-bottom:2px solid ${m.color}33">
          <div style="width:36px;height:36px;border-radius:50%;background:${m.color}22;border:2px solid ${m.color}44;display:flex;align-items:center;justify-content:center;font-size:18px">${m.icon}</div>
          <div>
            <div style="font-size:15px;font-weight:700;color:#fff">${m.name}</div>
            <div style="font-size:11px;color:#555d73">${mvs.length} vehicle${mvs.length!==1?'s':''} · $${m.laborRate||65}/hr</div>
          </div>
          <div style="margin-left:auto;font-size:11px;color:#555d73">${mvs.filter(v=>v.priority==='high').length} high priority</div>
        </div>
        ${mvs.length?`<div class="grid-cards">${mvs.map(v=>cardHTML(v,m.id)).join('')}</div>`:`<div style="text-align:center;font-size:13px;color:#374151;padding:16px 0">No vehicles assigned</div>`}
      </div>`;
    });

    if(unassigned.length){
      html+=`<div style="margin-bottom:20px">
        <div style="display:flex;align-items:center;gap:10px;padding:10px 0;margin-bottom:10px;border-bottom:2px solid #37415133">
          <div style="width:36px;height:36px;border-radius:50%;background:#37415122;border:2px solid #37415144;display:flex;align-items:center;justify-content:center;font-size:18px">🚗</div>
          <div>
            <div style="font-size:15px;font-weight:700;color:#fff">Not Assigned</div>
            <div style="font-size:11px;color:#555d73">${unassigned.length} vehicle${unassigned.length!==1?'s':''}</div>
          </div>
        </div>
        <div class="grid-cards">${unassigned.map(v=>cardHTML(v,null)).join('')}</div>
      </div>`;
    }

    if(!ST.vehicles.length) html=`<div class="empty"><div class="empty-icon">🚗</div><div class="empty-msg">No vehicles in recon</div></div>`;
  }

  c.innerHTML=html;

  c.querySelectorAll('.vehicle-card-grid[data-vid]').forEach(card=>{
    card.onclick=e=>{
      if(e.target.closest('.status-quick-btn')||e.target.closest('button'))return;
      ST.selectedId=card.dataset.vid;ST.view='detail';ST.activeTab='overview';render();
    };
  });
  c.querySelectorAll('[data-vid][data-sid]').forEach(btn=>{
    btn.onclick=e=>{
      e.stopPropagation();
      const v=ST.vehicles.find(x=>x.id===btn.dataset.vid);if(!v)return;
      const cur=v.statuses||[];
      const newStatuses=cur.includes(btn.dataset.sid)?cur.filter(s=>s!==btn.dataset.sid):[...cur,btn.dataset.sid];
      writeToCurrentVisit(v,'statuses',newStatuses);
      save();toast('Status updated');renderMechPipeline(c);
    };
  });
  c.querySelectorAll('button[data-vid]:not([data-sid]):not(.pipe-clockin-btn):not(.pipe-clockout-btn)').forEach(btn=>{
    btn.onclick=e=>{e.stopPropagation();ST.selectedId=btn.dataset.vid;ST.view='detail';ST.activeTab='overview';render();};
  });
  c.querySelectorAll('.pipe-clockin-btn').forEach(btn=>{
    btn.onclick=e=>{
      e.stopPropagation();
      const cMechId=btn.dataset.mechid||mechId;if(!cMechId)return;
      const veh=ST.vehicles.find(x=>x.id===btn.dataset.vid);if(!veh)return;
      const activeCnt=ST.vehicles.filter(vv=>(vv.timeSessions||[]).some(s=>s.mechId===cMechId&&!s.end)).length;
      if(activeCnt>=4){toast('Max 4 cars at once','err');return;}
      const sess={id:uid(),mechId:cMechId,vehicleId:veh.id,start:Date.now(),end:null};
      veh.timeSessions=[...(veh.timeSessions||[]),sess];
      Object.assign(veh,{updatedAt:Date.now()});
      ST.vehicles=ST.vehicles.map(x=>x.id===veh.id?veh:x);
      save();toast('Clocked in — '+veh.year+' '+veh.make);renderMechPipeline(c);
    };
  });
  c.querySelectorAll('.pipe-clockout-btn').forEach(btn=>{
    btn.onclick=e=>{
      e.stopPropagation();
      const veh=ST.vehicles.find(x=>x.id===btn.dataset.vid);if(!veh)return;
      const idx2=(veh.timeSessions||[]).findIndex(s=>s.id===btn.dataset.sessid);if(idx2<0)return;
      veh.timeSessions[idx2].end=Date.now();
      const mins=Math.round((veh.timeSessions[idx2].end-veh.timeSessions[idx2].start)/60000);
      Object.assign(veh,{updatedAt:Date.now()});
      ST.vehicles=ST.vehicles.map(x=>x.id===veh.id?veh:x);
      save();toast('Clocked out — '+mins+'m logged');renderMechPipeline(c);
    };
  });
}

function renderDetailerQueue(c){

  if(!queue.length){
    c.innerHTML=`<div class="mechanic-header"><div class="mech-avatar" style="background:#1e1535;font-size:24px">🧹</div><div><div style="font-size:16px;font-weight:600;color:#fff">Detailer</div><div style="font-size:13px;color:#9ca3af">Ready to clean queue</div></div></div>
    <div class="empty"><div class="empty-icon">✨</div><div class="empty-msg">Clean queue is empty</div><div class="empty-sub">Vehicles marked "Ready to clean" will appear here</div></div>`;

      <div class="vcg-body">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
          <div style="font-size:14px;font-weight:600;color:#fff">${v.year||''} ${v.make||''} ${v.model||''}</div>
          <span class="v-pri" style="background:${pri.color}18;color:${pri.color};font-size:10px">${pri.icon} ${pri.label}</span>
        </div>
        <div style="font-size:11px;color:#555d73;margin-bottom:8px">#${v.stockNumber||'—'} · ${v.color||''}</div>
        ${v.notes?`<div style="font-size:11px;color:#9ca3af;margin-bottom:10px;font-style:italic">"${v.notes.slice(0,100)}"</div>`:''}
        <div style="display:flex;gap:8px">
          <button class="out-btn" style="font-size:12px;padding:8px 12px" data-view="${v.id}">View details</button>
          <button class="btn-red" style="flex:1;padding:10px;font-size:12px;font-weight:600;border-radius:8px" data-done="${v.id}">✅ Done — mark for sale</button>
        </div>
      </div>
    </div>`;
  });
  html+=`</div>`;
  c.innerHTML=html;

  c.querySelectorAll('[data-view]').forEach(btn=>{
    btn.onclick=()=>{ST.selectedId=btn.dataset.view;ST.view='detail';ST.activeTab='overview';render()};
  });
  c.querySelectorAll('[data-done]').forEach(btn=>{
    btn.onclick=()=>{
      const v=ST.vehicles.find(x=>x.id===btn.dataset.done);
      if(!v)return;
      const newStatuses=[...(v.statuses||[]).filter(s=>s!=='cleaning'),'sale'];
      writeToCurrentVisit(v,'statuses',newStatuses);
      save();toast(`${v.year} ${v.make} ${v.model} marked ready for sale`);
      renderDetailerQueue(c);
    };
  });
}

function renderInvoice(c,v){
  if(!v){c.innerHTML='<div class="empty"><div class="empty-msg">No vehicle selected</div></div>';return}
  setTopbar('Recon invoice',`<button class="btn-ghost" onclick="ST.view='detail';render()">← Back</button><button class="btn-red" onclick="window.print()">🖨 Print</button>`);

  const parts=v.parts||[];
  const laborLines=v.laborLines||[];
  const legacyRepairs=v.repairs||[];
  const taxRate=SETTINGS.taxRate||0;

  const partsSubtotal=parts.reduce((a,p)=>a+((parseFloat(p.cost)||0)*(parseInt(p.qty)||1)),0);
  const laborSubtotal=laborLines.reduce((a,l)=>a+((parseFloat(l.hours)||0)*(parseFloat(l.rate)||0)),0);
  const legacySubtotal=legacyRepairs.reduce((a,r)=>a+Number(r.cost||0),0);
  const subtotal=partsSubtotal+laborSubtotal+legacySubtotal;
  const taxAmt=subtotal*(taxRate/100);
  const grandTotal=subtotal+taxAmt;

  const sessions=(v.timeSessions||[]).filter(s=>s.end);
  const totalHrs=sessions.reduce((a,s)=>a+((s.end-s.start)/3600000),0);
  const statLabels=(v.statuses||[]).map(id=>SMAP[id]?.label||id).join(' · ');

  const partsRows=parts.map(p=>{
    const ext=(parseFloat(p.cost)||0)*(parseInt(p.qty)||1);
    return`<div class="invoice-line"><div>${p.name}${p.partNum?` <span style="font-size:11px;color:#888;background:#f3f4f6;padding:1px 5px;border-radius:3px">#${p.partNum}</span>`:''}<span style="font-size:11px;color:#888;margin-left:6px">×${p.qty||1} @ ${fmt$(p.cost)}</span></div><div style="font-weight:700;min-width:70px;text-align:right">${fmt$(ext)}</div></div>`;
  }).join('');

  const laborRows=laborLines.map(l=>{
    const tot=(parseFloat(l.hours)||0)*(parseFloat(l.rate)||0);
    return`<div class="invoice-line"><div>${l.desc}<span style="font-size:11px;color:#888;margin-left:6px">${l.hours}h @ ${fmt$(l.rate)}/hr</span></div><div style="font-weight:700;min-width:70px;text-align:right">${fmt$(tot)}</div></div>`;
  }).join('');

  const legRows=legacyRepairs.map(r=>`<div class="invoice-line"><div>${r.description}${r.mechanic?` <span style="font-size:11px;color:#888;background:#f3f4f6;padding:1px 5px;border-radius:3px">${r.mechanic}</span>`:''}</div><div style="font-weight:700;min-width:70px;text-align:right">${fmt$(r.cost)}</div></div>`).join('');

  const sessionLog=sessions.length?`<div style="margin-top:14px;padding:12px;background:#f9fafb;border-radius:8px">
    <div style="font-size:10px;font-weight:700;color:#888;letter-spacing:1px;margin-bottom:8px">LABOR LOG (${totalHrs.toFixed(2)}h total)</div>
    ${sessions.map(s=>{const m=s.mechId?getMMAP()[s.mechId]:null;const mins=Math.round((s.end-s.start)/60000);return`<div style="display:flex;justify-content:space-between;font-size:12px;color:#555;padding:3px 0;border-bottom:1px solid #eee"><span>${m?.name||s.mechId} · ${new Date(s.start).toLocaleDateString()}</span><span>${mins}m</span></div>`;}).join('')}
  </div>`:'';

  c.innerHTML=`
  <div class="invoice-wrap">
    <div class="invoice-hdr">
      <div>
        <div class="invoice-co">AUTOMOTIVE CONNECTION</div>
        <div class="invoice-addr">5210 Dixie HWY · Fairfield, OH 45014</div>
        <div class="invoice-addr">513-858-6555 · autoconnectionoh.com</div>
      </div>
      <div style="text-align:right">
        <div class="invoice-title">RECON INVOICE</div>
        <div class="invoice-addr" style="margin-top:5px">${fmtD(Date.now())} · Stock #${v.stockNumber||'—'}</div>
      </div>
    </div>
    <div class="invoice-vehicle-box">
      <div style="font-size:18px;font-weight:800">${v.year||''} ${v.make||''} ${v.model||''}</div>
      <div style="font-size:12px;color:#555;margin-top:4px">VIN: ${v.vin||'—'} · ${v.color||''} · ${Number(v.mileage||0).toLocaleString()} mi</div>
      ${statLabels?`<div style="font-size:11px;color:#777;margin-top:4px">${statLabels}</div>`:''}
    </div>

    ${partsRows?`<div style="margin-bottom:16px"><div class="invoice-cat">PARTS & MATERIALS</div>${partsRows}<div class="invoice-line" style="border-top:1px solid #e5e7eb;margin-top:4px;padding-top:6px"><div style="color:#666">Parts subtotal</div><div style="font-weight:700;min-width:70px;text-align:right">${fmt$(partsSubtotal)}</div></div></div>`:''}

    ${laborRows?`<div style="margin-bottom:16px"><div class="invoice-cat">LABOR</div>${laborRows}<div class="invoice-line" style="border-top:1px solid #e5e7eb;margin-top:4px;padding-top:6px"><div style="color:#666">Labor subtotal</div><div style="font-weight:700;min-width:70px;text-align:right">${fmt$(laborSubtotal)}</div></div></div>${sessionLog}`:''}

    ${legRows?`<div style="margin-bottom:16px"><div class="invoice-cat">REPAIRS</div>${legRows}<div class="invoice-line" style="border-top:1px solid #e5e7eb;margin-top:4px;padding-top:6px"><div style="color:#666">Repairs subtotal</div><div style="font-weight:700;min-width:70px;text-align:right">${fmt$(legacySubtotal)}</div></div></div>`:''}

    ${taxRate>0?`<div class="invoice-line" style="border-top:1px solid #d1d5db;padding-top:8px;margin-bottom:4px"><div style="color:#555">Subtotal</div><div style="font-weight:600;min-width:70px;text-align:right">${fmt$(subtotal)}</div></div>
    <div class="invoice-line" style="margin-bottom:4px"><div style="color:#555">Sales tax (${taxRate}%)</div><div style="font-weight:600;min-width:70px;text-align:right">${fmt$(taxAmt)}</div></div>`:''}

    <div class="invoice-total-bar">
      <div style="font-weight:800;letter-spacing:1px;font-size:14px">TOTAL RECON COST</div>
      <div style="font-size:22px;font-weight:900">${fmt$(grandTotal)}</div>
    </div>
    ${v.notes?`<div style="margin-top:14px;padding:12px;background:#f9fafb;border-radius:8px;font-size:13px;color:#555"><strong>Notes:</strong> ${v.notes}</div>`:''}
  </div>`;
}


function toggleSidebar(){
  const sb=document.getElementById('sidebar');
  const ov=document.getElementById('sb-overlay');
  const isOpen=sb.classList.contains('open');
  if(isOpen){sb.classList.remove('open');ov.classList.remove('show');}
  else{sb.classList.add('open');ov.classList.add('show');}
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sb-overlay').classList.remove('show');
}
window.toggleSidebar=toggleSidebar;
window.closeSidebar=closeSidebar;

  return ST.vehicles.reduce((n,v)=>{
    return n+(v.concerns||[]).filter(c=>c.status==='pending').length;
  },0);
}

function renderSalesPipeline(c){
  const isSales=ST.role==='sales';
  const pending=ST.vehicles.filter(v=>(v.statuses||[]).includes('sale_pending'));
  const sold=ST.vehicles.filter(v=>(v.statuses||[]).includes('sold'));

  setTopbar(isSales?'My sales pipeline':'Sale pending & sold',
    isSales?`<button class="btn-red" onclick="openSalesAddVehicleModal()">+ Add vehicle</button>`:``);

  let html='';

  // ── SALE PENDING ──
  if(pending.length){
    html+=`<div style="background:#1a1200;border:1px solid #f59e0b44;border-radius:12px;padding:13px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px">
      <span style="font-size:22px">🤝</span>
      <div><div style="font-size:13px;font-weight:700;color:#fbbf24">${pending.length} vehicle${pending.length!==1?'s':''} sale pending — high priority</div>
      <div style="font-size:11px;color:#92400e;margin-top:2px">Add concerns → manager approves → work begins</div></div>
      ${pendingConcernCount()>0?`<div style="margin-left:auto;background:#C8102E;color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:10px;white-space:nowrap">${pendingConcernCount()} awaiting approval</div>`:''}
    </div>`;
    pending.forEach(v=>{ html+=salePendingCardHTML(v,isSales); });
  }

  // ── SOLD ──
  if(sold.length){
    html+=`<div class="sec-hdr" style="margin-top:${pending.length?'20px':'0'}"><span style="color:#10b981">💰 Sold (${sold.length})</span></div>`;
    sold.forEach(v=>{
      const recon=(v.repairs||[]).reduce((a,r)=>a+Number(r.cost||0),0);
      html+=`<div class="v-row" data-vid="${v.id}">
        ${v.photos?.[0]?`<div class="v-row-photo"><img src="${photoUrl(v.photos[0])}" loading="lazy"></div>`:`<div class="v-row-photo-empty"><svg width="18" height="18" viewBox="0 0 16 16" fill="none"><path d="M2 10L4 5h8l2 5H2z" stroke="#374151" stroke-width="1.2" fill="none"/></svg></div>`}
        <div style="min-width:0"><div class="v-name">${v.year||''} ${v.make||''} ${v.model||''}</div>
        <div class="v-meta">#${v.stockNumber||'—'} · ...${(v.vin||'------').slice(-6)}</div>
        <div class="v-tags"><span class="v-tag" style="background:#10b98122;color:#10b981;border-color:#10b98133">💰 Sold</span>
        <span class="v-tag" style="background:#ef444422;color:#ef4444;border-color:#ef444433">🔴 High priority</span></div></div>
        <div class="v-cost">${fmt$(recon)}</div>
        <svg class="v-chevron" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke="#374151" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>`;
    });
  }

  if(!pending.length&&!sold.length){
    html+=`<div class="empty"><div class="empty-icon">🤝</div>
      <div class="empty-msg">No sale pending or sold vehicles</div>
      <div class="empty-sub">Tap "+ Add vehicle" to add a car to the work queue</div></div>`;
  }

  c.innerHTML=html;

  c.querySelectorAll('.v-row[data-vid]').forEach(row=>{
    row.onclick=()=>{ST.selectedId=row.dataset.vid;ST.view='detail';ST.activeTab='concerns';render()};
  });
  c.querySelectorAll('.sp-card[data-vid]').forEach(card=>{
    card.onclick=e=>{if(e.target.closest('button'))return;ST.selectedId=card.dataset.vid;ST.view='detail';ST.activeTab='concerns';render();};
  });
  c.querySelectorAll('[data-add-concern]').forEach(btn=>{
    btn.onclick=e=>{e.stopPropagation();openAddConcernModal(btn.dataset.addConcern);};
  });
  c.querySelectorAll('[data-add-queue]').forEach(btn=>{
    btn.onclick=e=>{e.stopPropagation();openAddToQueueModal(btn.dataset.addQueue);};
  });
}

window.submitAddToQueue=function(vehicleId, btn){
  const mechId=document.getElementById('queue-mech')?.value;
  const desc=document.getElementById('queue-desc')?.value.trim();
  if(!mechId){toast('Choose a mechanic','err');return;}
  const v=ST.vehicles.find(x=>x.id===vehicleId);
  if(!v) return;
  // Add repair job
  if(desc){
    writeToCurrentVisit(v,'repairs',[...(v.repairs||[]),{id:uid(),description:desc,cost:'0',mechanic:getMMAP()[mechId]?.name||'',category:'sales request',date:Date.now()}]);
  }
  // Set statuses and assignment
  if(!(v.statuses||[]).includes('recon')){
    writeToCurrentVisit(v,'statuses',[...(v.statuses||[]),'recon']);
  }
  writeToCurrentVisit(v,'assignedTo',mechId);
  writeToCurrentVisit(v,'priority','high');
  save();
  btn.closest('div[style*=fixed]').remove();
  toast(`Added to ${getMMAP()[mechId]?.name}'s queue`);
  render();
};

// ═══════════════════════════════════════════════
// APPROVALS — manager reviews customer concerns
// ═══════════════════════════════════════════════
function renderApprovals(c){
  setTopbar('Concern approvals','');
  const count=pendingConcernCount();

  // Collect all vehicles with any concerns
  const withConcerns=ST.vehicles.filter(v=>(v.concerns||[]).length>0);

  // Split into two groups:
  //   needsApproval: has >=1 pending concern
  //   allReviewed:   every concern already reviewed
  const needsApproval=withConcerns.filter(v=>(v.concerns||[]).some(c=>c.status==='pending'));
  const allReviewed=withConcerns.filter(v=>!(v.concerns||[]).some(c=>c.status==='pending'));

  // Order vehicles within each group
  // Needs approval: oldest pending concern first
  needsApproval.sort((a,b)=>{
    const aOldestPending=Math.min(...(a.concerns||[]).filter(c=>c.status==='pending').map(c=>c.createdAt||0));
    const bOldestPending=Math.min(...(b.concerns||[]).filter(c=>c.status==='pending').map(c=>c.createdAt||0));
    return aOldestPending-bOldestPending;
  });
  // Reviewed: most recent reviewed action first
  allReviewed.sort((a,b)=>{
    const aLatest=Math.max(...(a.concerns||[]).map(c=>c.reviewedAt||c.createdAt||0));
    const bLatest=Math.max(...(b.concerns||[]).map(c=>c.reviewedAt||c.createdAt||0));
    return bLatest-aLatest;
  });

  let html='';

  // Empty state
  if(!withConcerns.length){
    html+=`<div class="empty"><div class="empty-icon">✅</div><div class="empty-msg">No concerns to review</div><div class="empty-sub">Customer concerns submitted by sales will appear here</div></div>`;
    c.innerHTML=html;
    return;
  }

  // Top summary banner (only if there's anything pending)
  if(count>0){
    html+=`<div style="background:#1a0e10;border:1px solid #C8102E44;border-radius:12px;padding:13px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px">
      <span style="font-size:22px">⚠️</span>
      <div style="font-size:14px;font-weight:600;color:#fca5a5">${count} concern${count!==1?'s':''} awaiting your approval</div>
    </div>`;
  }

  // Render a single concern row (inner, used inside vehicle cards)
  function concernRow(con, vId){
    const isPending=con.status==='pending';
    return `<div style="padding:10px 0;border-bottom:1px solid #1e2230">
      <div style="display:flex;align-items:flex-start;gap:10px">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;color:#e2e4ea;font-weight:500;margin-bottom:3px;line-height:1.5">${con.description}</div>
          <div style="font-size:11px;color:#555d73">By ${con.addedBy} · ${fmtD(con.createdAt)}${con.reviewedAt?` · reviewed ${fmtD(con.reviewedAt)}`:''}</div>
          ${con.managerNote?`<div style="font-size:11px;color:#9ca3af;margin-top:4px;font-style:italic">Note: ${con.managerNote}</div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0">
          ${isPending?`
            <div style="display:flex;gap:5px">
              <button data-approve="${vId}|${con.id}" style="background:#065f46;border:none;color:#4ade80;font-size:11px;font-weight:700;padding:5px 10px;border-radius:6px;cursor:pointer">✓ Approve</button>
              <button data-reject="${vId}|${con.id}" style="background:#7f1d1d;border:none;color:#fca5a5;font-size:11px;font-weight:700;padding:5px 10px;border-radius:6px;cursor:pointer">✕ Reject</button>
            </div>
            <button data-approve-assign="${vId}|${con.id}" style="background:#1e3a5f;border:none;color:#93c5fd;font-size:11px;font-weight:600;padding:5px 10px;border-radius:6px;cursor:pointer;white-space:nowrap">✓ Approve + assign mechanic</button>
          `:''}
          ${con.status==='approved'?`<span style="background:#0a1f0f;color:#4ade80;border:1px solid #4ade8033;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px">✓ Approved${con.assignedTo?' → '+(getMMAP()[con.assignedTo]?.name||''):''}</span>`:''}
          ${con.status==='rejected'?`<span style="background:#1c0000;color:#f87171;border:1px solid #f8717133;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px">✕ Rejected</span>`:''}
          ${ST.masterPinUnlocked?`<button data-delete-concern="${vId}|${con.id}" title="Delete concern" style="background:#1a0d0d;border:1px solid #f8717155;color:#fca5a5;font-size:11px;font-weight:700;padding:4px 9px;border-radius:6px;cursor:pointer;margin-top:4px">🗑 Delete</button>`:''}
        </div>
      </div>
    </div>`;
  }

  // Render one vehicle card, with concerns ordered per the section's rules
  function vehicleCard(v, section){
    const concerns=v.concerns||[];
    const pending=concerns
      .filter(c=>c.status==='pending')
      .sort((a,b)=>(a.createdAt||0)-(b.createdAt||0)); // oldest first
    const reviewed=concerns
      .filter(c=>c.status!=='pending')
      .sort((a,b)=>(b.reviewedAt||b.createdAt||0)-(a.reviewedAt||a.createdAt||0)); // newest first

    // Section-specific concern ordering
    let orderedConcerns;
    let borderColor;
    let badge;
    if(section==='pending'){
      // Pending block goes first (oldest first), then reviewed siblings (newest first)
      orderedConcerns=[...pending, ...reviewed];
      borderColor='#C8102E44';
      badge=`<span style="background:#C8102E;color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:8px">${pending.length} pending</span>`;
    } else {
      orderedConcerns=reviewed; // all reviewed, newest first
      borderColor='#1e2230';
      badge=`<span style="background:#065f46;color:#4ade80;font-size:10px;font-weight:700;padding:3px 9px;border-radius:8px">All reviewed</span>`;
    }

    return `<div style="background:#111318;border:1px solid ${borderColor};border-radius:12px;margin-bottom:14px;overflow:hidden">
      <div style="padding:12px 16px;border-bottom:1px solid #1e2230;display:flex;align-items:center;gap:10px;cursor:pointer" onclick="ST.selectedId='${v.id}';ST.view='detail';ST.activeTab='concerns';render()">
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${v.year||''} ${v.make||''} ${v.model||''}</div>
          <div style="font-size:11px;color:#555d73">#${v.stockNumber||'—'} · ${concerns.length} concern${concerns.length!==1?'s':''} · tap to open →</div>
        </div>
        ${badge}
      </div>
      <div style="padding:8px 16px 14px">
        ${orderedConcerns.map(con=>concernRow(con, v.id)).join('')}
      </div>
    </div>`;
  }

  // ═══ Section 1: Needs approval ═══
  if(needsApproval.length){
    html+=`<div style="font-size:11px;font-weight:700;color:#f87171;letter-spacing:1px;margin:0 0 10px;text-transform:uppercase">🔴 Needs approval · ${needsApproval.length} vehicle${needsApproval.length!==1?'s':''} · oldest first</div>`;
    needsApproval.forEach(v=>{ html += vehicleCard(v, 'pending'); });
  }

  // ═══ Section 2: Reviewed ═══
  if(allReviewed.length){
    html+=`<div style="font-size:11px;font-weight:700;color:#555d73;letter-spacing:1px;margin:${needsApproval.length?'22px':'0'} 0 10px;text-transform:uppercase">✓ Reviewed · ${allReviewed.length} vehicle${allReviewed.length!==1?'s':''} · newest first</div>`;
    allReviewed.forEach(v=>{ html += vehicleCard(v, 'reviewed'); });
  }

  c.innerHTML=html;

  c.querySelectorAll('[data-approve]').forEach(btn=>{
    btn.onclick=(e)=>{
      e.stopPropagation();
      const [vid,cid]=btn.dataset.approve.split('|');
      updateConcern(vid,cid,{status:'approved'});
    };
  });
  c.querySelectorAll('[data-reject]').forEach(btn=>{
    btn.onclick=(e)=>{
      e.stopPropagation();
      const [vid,cid]=btn.dataset.reject.split('|');
      const note=prompt('Reason for rejection (optional):');
      updateConcern(vid,cid,{status:'rejected',managerNote:note||''});
    };
  });
  c.querySelectorAll('[data-approve-assign]').forEach(btn=>{
    btn.onclick=(e)=>{
      e.stopPropagation();
      const [vid,cid]=btn.dataset.approveAssign.split('|');
      openAssignConcernModal(vid,cid);
    };
  });
  c.querySelectorAll('[data-delete-concern]').forEach(btn=>{
    btn.onclick=(e)=>{
      e.stopPropagation();
      const [vid,cid]=btn.dataset.deleteConcern.split('|');
      deleteConcern(vid,cid);
    };
  });
}

function updateConcern(vehicleId, concernId, updates){
  const v=ST.vehicles.find(x=>x.id===vehicleId);
  if(!v) return;
  const newConcerns=(v.concerns||[]).map(c=>c.id===concernId?{...c,...updates,reviewedAt:Date.now()}:c);
  writeToCurrentVisit(v, 'concerns', newConcerns);
  save();
  toast(updates.status==='approved'?'Concern approved':'Concern rejected');
  render();
}

// Delete a concern entirely (gated by Master PIN — button only shows when unlocked)
window.deleteConcern=function(vehicleId, concernId){
  if(!ST.masterPinUnlocked){
    toast('Unlock with Master PIN first','err');
    return;
  }
  const v=ST.vehicles.find(x=>x.id===vehicleId);
  if(!v) return;
  const concern=(v.concerns||[]).find(c=>c.id===concernId);
  if(!concern) return;
  if(!confirm('Delete this concern?\n\n"'+(concern.description||'').slice(0,120)+'"\n\nThis cannot be undone.')) return;
  const newConcerns=(v.concerns||[]).filter(c=>c.id!==concernId);
  writeToCurrentVisit(v, 'concerns', newConcerns);
  save();
  toast('Concern deleted');
  render();

function openAssignConcernModal(vehicleId, concernId){
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px';

      ${getMechs().map(m=>`
        <button onclick="approveConcernWithMech('${vehicleId}','${concernId}','${m.id}',this)"
          style="width:100%;background:#161921;border:1px solid #2a2f3f;color:#e2e4ea;border-radius:9px;padding:13px 16px;margin-bottom:8px;text-align:left;cursor:pointer;font-size:14px;font-weight:500">

window.approveConcernWithMech=function(vehicleId,concernId,mechId,btn){
  const v=ST.vehicles.find(x=>x.id===vehicleId);
  if(!v) return;
  // Approve concern
  const newConcerns=(v.concerns||[]).map(c=>c.id===concernId?{...c,status:'approved',assignedTo:mechId,reviewedAt:Date.now()}:c);
  writeToCurrentVisit(v, 'concerns', newConcerns);

  // Add to repairs queue
  const concern=newConcerns.find(c=>c.id===concernId);
  if(concern){
    const newRepairs=[...(v.repairs||[]),{
      id:uid(), description:concern.description,
      cost:'0', mechanic:getMMAP()[mechId]?.name||'',
      category:'customer concern', date:Date.now(),
      fromConcern:concernId
    }];
    writeToCurrentVisit(v, 'repairs', newRepairs);

    // Make sure vehicle is in recon status
    if(!(v.statuses||[]).includes('recon')){
      writeToCurrentVisit(v, 'statuses', [...(v.statuses||[]),'recon']);
    }
    if(!v.assignedTo){
      writeToCurrentVisit(v, 'assignedTo', mechId);
    }
  }
  save();
  btn.closest('div[style*=fixed]').remove();
  toast('Approved — added to mechanic repair list');
  render();
};

// ═══════════════════════════════════════════════
// STORAGE MIGRATION — one-tap move from Firestore to Firebase Storage
// ═══════════════════════════════════════════════
function updateStorageMigrationStats(){
  const el=document.getElementById('storage-migration-stats');
  if(!el) return;
  let legacyPhotos=0, migratedPhotos=0, legacyReceipts=0, migratedReceipts=0;
  for(const v of ST.vehicles){
    const visits=(v.visits&&v.visits.length)?v.visits:[v];
    for(const vi of visits){
      if(!vi||typeof vi!=='object') continue;
      for(const p of (vi.photos||[])){
        if(typeof p==='string') legacyPhotos++;
        else if(p&&p.url) migratedPhotos++;
        else if(p&&p.data) legacyPhotos++;
      }
      for(const r of (vi.receipts||[])){
        if(typeof r==='string') legacyReceipts++;
        else if(r&&r.url) migratedReceipts++;
        else if(r&&r.data) legacyReceipts++;
      }
    }
  }
  const totalLegacy=legacyPhotos+legacyReceipts;
  el.innerHTML=`Photos: <span style="color:#fbbf24">${legacyPhotos} legacy</span> · <span style="color:#6ee7b7">${migratedPhotos} in Storage</span><br>Receipts: <span style="color:#fbbf24">${legacyReceipts} legacy</span> · <span style="color:#6ee7b7">${migratedReceipts} in Storage</span>`;
  const btn=document.getElementById('btn-migrate-storage');
  if(btn){
    if(totalLegacy===0){
      btn.disabled=true;
      btn.style.opacity='0.5';
      btn.style.cursor='not-allowed';
      btn.textContent='✅ All files already in Storage';
    }
  }
}

async function startStorageMigration(){
  if(!storage){
    toast('Firebase Storage not available','err');
    return;
  }
  const btn=document.getElementById('btn-migrate-storage');
  const log=document.getElementById('storage-migration-progress');
  if(!btn||!log) return;

  btn.disabled=true;
  btn.style.opacity='0.5';
  btn.style.cursor='not-allowed';
  btn.textContent='Migrating…';
  log.style.display='block';
  log.innerHTML='';

  const logLine=(msg,color)=>{
    const line=document.createElement('div');
    if(color) line.style.color=color;
    line.textContent=msg;
    log.appendChild(line);
    log.scrollTop=log.scrollHeight;
  };

  const shopId='automotive_connection';
  let photosMigrated=0, photosFailed=0;
  let receiptsMigrated=0, receiptsFailed=0;
  let vehiclesTouched=0;

  logLine('═══ Storage migration starting ═══','#6ee7b7');
  logLine(`${ST.vehicles.length} vehicles to scan`);

  for(const v of ST.vehicles){
    let vehicleChanged=false;
    const visits=(v.visits&&v.visits.length)?v.visits:[];
    // Build a list of targets: top-level + every visit
    const targets=[{obj:v,label:'(top-level)'}];
    for(let j=0;j<visits.length;j++){
      targets.push({obj:visits[j],label:`visit #${j+1}`});
    }

    for(const t of targets){
      const holder=t.obj;
      if(!holder||typeof holder!=='object') continue;

      // PHOTOS
      if(Array.isArray(holder.photos)){
        for(let i=0;i<holder.photos.length;i++){
          const p=holder.photos[i];
          if(p&&typeof p==='object'&&p.url) continue;
          let dataUrl=null;
          if(typeof p==='string') dataUrl=p;
          else if(p&&typeof p==='object'&&p.data) dataUrl=p.data;
          if(!dataUrl||!dataUrl.startsWith('data:')){continue;}
          try {
            const blob=dataUrlToBlob(dataUrl);
            const ext=extFromMime(blob.type);
            const path=`shops/${shopId}/vehicles/${v.id}/photos/${uid()}.${ext}`;
            const obj=await uploadToStorage(blob,path);
            holder.photos[i]=obj;
            photosMigrated++;
            vehicleChanged=true;
            logLine(`✅ ${v.stockNumber||'?'} photo ${i+1} ${t.label} → ${Math.round(blob.size/1024)} KB`,'#6ee7b7');
          } catch(e) {
            photosFailed++;
            logLine(`❌ ${v.stockNumber||'?'} photo ${i+1} ${t.label}: ${e.message}`,'#fca5a5');
          }
        }
      }

      // RECEIPTS
      if(Array.isArray(holder.receipts)){
        for(let i=0;i<holder.receipts.length;i++){
          const r=holder.receipts[i];
          if(r&&typeof r==='object'&&r.url) continue;
          let dataUrl=null, name='receipt';
          if(typeof r==='string'){dataUrl=r;name='receipt.jpg';}
          else if(r&&typeof r==='object'){
            dataUrl=r.data;
            name=r.name||'receipt';
          }
          if(!dataUrl||!dataUrl.startsWith('data:')){continue;}
          try {
            const blob=dataUrlToBlob(dataUrl);
            const ext=extFromMime(blob.type);
            const path=`shops/${shopId}/vehicles/${v.id}/receipts/${uid()}.${ext}`;
            const obj=await uploadToStorage(blob,path);
            holder.receipts[i]={...obj,name,date:(r&&r.date)||Date.now()};
            receiptsMigrated++;
            vehicleChanged=true;
            logLine(`✅ ${v.stockNumber||'?'} receipt ${i+1} (${name}) ${t.label} → ${Math.round(blob.size/1024)} KB`,'#6ee7b7');
          } catch(e) {
            receiptsFailed++;
            logLine(`❌ ${v.stockNumber||'?'} receipt ${i+1} ${t.label}: ${e.message}`,'#fca5a5');
          }
        }
      }
    }

    if(vehicleChanged){
      vehiclesTouched++;
      try {
        save();
      } catch(e) {
        logLine(`⚠ Save failed for ${v.stockNumber}: ${e.message}`,'#fbbf24');
      }
    }
  }

  logLine('','');
  logLine('═══ Migration complete ═══','#6ee7b7');
  logLine(`Photos: ${photosMigrated} migrated, ${photosFailed} failed`);
  logLine(`Receipts: ${receiptsMigrated} migrated, ${receiptsFailed} failed`);
  logLine(`Vehicles updated: ${vehiclesTouched}`);

  if(photosMigrated+receiptsMigrated>0){
    toast(`Migrated ${photosMigrated+receiptsMigrated} files to Storage`);
  } else if(photosFailed+receiptsFailed===0){
    toast('No legacy files to migrate');
  } else {
    toast('Migration finished with errors — see log','err');
  }

  btn.disabled=false;
  btn.style.opacity='1';
  btn.style.cursor='pointer';
  btn.textContent='🚀 Migrate photos & receipts to Storage';
  updateStorageMigrationStats();
}

window.startStorageMigration=startStorageMigration;
window.updateStorageMigrationStats=updateStorageMigrationStats;

function showMasterPinPad(onSuccess){
  document.getElementById('master-pin-overlay')?.remove();
  let entered = '';
  const overlay = document.createElement('div');
  overlay.id = 'master-pin-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px';
  overlay.innerHTML = `
  <div style="width:100%;max-width:320px">
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:32px;margin-bottom:8px">🔐</div>
      <div style="font-size:18px;font-weight:700;color:#fff;margin-bottom:4px">Master PIN</div>
      <div style="font-size:12px;color:#555d73">Required to enable destructive actions</div>
    </div>
    <div id="mpin-dots" style="display:flex;justify-content:center;gap:14px;margin-bottom:28px">
      ${[0,1,2,3].map(i=>`<div style="width:16px;height:16px;border-radius:50%;border:2px solid #374151;background:transparent" id="mpd-${i}"></div>`).join('')}
    </div>
    <div id="mpin-err" style="display:none;text-align:center;color:#f87171;font-size:13px;margin-bottom:14px">Incorrect Master PIN</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
      ${[1,2,3,4,5,6,7,8,9,'←',0,'✓'].map(k=>`
      <button onclick="mpinKey('${k}')" style="background:${k==='✓'?'#C8102E':k==='←'?'#1e2230':'#161921'};border:1px solid #2a2f3f;color:#fff;font-size:${k==='←'||k==='✓'?'20':'22'}px;font-weight:600;padding:18px 0;border-radius:12px;cursor:pointer;font-family:inherit">${k}</button>`).join('')}
    </div>
    <button onclick="document.getElementById('master-pin-overlay').remove()" style="width:100%;margin-top:16px;background:transparent;border:1px solid #2a2f3f;color:#555d73;font-size:13px;padding:12px;border-radius:9px;cursor:pointer">Cancel</button>
  </div>`;
  document.body.appendChild(overlay);

  function updateDots(){
    [0,1,2,3].forEach(i=>{
      const d = document.getElementById(`mpd-${i}`);
      if(d){d.style.background = i<entered.length?'#C8102E':'transparent';d.style.borderColor = i<entered.length?'#C8102E':'#374151';}
    });
  }

  function handleKey(e){
    if(!document.getElementById('master-pin-overlay')) return;
    if(e.key>='0'&&e.key<='9') window.mpinKey(e.key);
    else if(e.key==='Backspace') window.mpinKey('←');
    else if(e.key==='Enter') window.mpinKey('✓');
    else if(e.key==='Escape'){document.getElementById('master-pin-overlay')?.remove(); document.removeEventListener('keydown',handleKey);}
  }
  document.addEventListener('keydown', handleKey);
  const obs = new MutationObserver(()=>{
    if(!document.getElementById('master-pin-overlay')){
      document.removeEventListener('keydown', handleKey);
      obs.disconnect();
    }
  });
  obs.observe(document.body, {childList:true});

  window.mpinKey = function(k){
    const errEl = document.getElementById('mpin-err');
    if(errEl) errEl.style.display = 'none';
    if(k==='←'){entered = entered.slice(0,-1);}
    else if(k==='✓'){
      const correct = (SETTINGS.pins && SETTINGS.pins.master) || '7918';
      if(entered === correct){
        overlay.remove();
        ST.masterPinUnlocked = true;
        toast('🔓 Destructive actions unlocked for this session');
        if(typeof onSuccess === 'function') onSuccess();
        else render();
      } else {
        entered = '';
        updateDots();
        if(errEl) errEl.style.display = 'block';
        const pad = overlay.querySelector('div[style*="max-width"]');
        if(pad){pad.style.animation = 'none'; setTimeout(()=>{pad.style.animation = 'shake .4s ease';}, 10);}
      }
      return;
    } else {
      if(entered.length < 4) entered += k;
    }
    updateDots();
    if(entered.length === 4){
      setTimeout(()=>window.mpinKey('✓'), 100);
    }
  };
}

// Delete an individual visit from its owning vehicle (History tab action)
// Gated by Master PIN (defensive — button only shows when unlocked anyway)
// Refuses to delete the last remaining visit on a vehicle.
window.deleteVisitById = function(visitId){
  if(!ST.masterPinUnlocked){
    toast('Unlock with Master PIN first','err');
    return;
  }
  // Find the owning vehicle
  const vehicle = ST.vehicles.find(v => (v.visits||[]).some(vi => vi.id === visitId));
  if(!vehicle){
    toast('Visit not found','err');
    return;
  }
  if((vehicle.visits||[]).length <= 1){
    alert('Cannot delete the last remaining visit. Delete the whole vehicle instead from the header.');
    return;
  }
  const visit = vehicle.visits.find(vi => vi.id === visitId);
  const visitIdx = vehicle.visits.findIndex(vi => vi.id === visitId) + 1;
  const stock = visit.stockNumber || vehicle.stockNumber || '—';
  const partsCount = (visit.parts||[]).length;
  const laborCount = (visit.laborLines||[]).length;
  const photoCount = (visit.photos||[]).length;
  const receiptCount = (visit.receipts||[]).length;
  const summary = 'This will permanently delete:\n'
    + '  • Visit #' + visitIdx + ' (Stock #' + stock + ')\n'
    + '  • ' + partsCount + ' parts entries\n'
    + '  • ' + laborCount + ' labor lines\n'
    + '  • ' + photoCount + ' photos (linked)\n'
    + '  • ' + receiptCount + ' receipts (linked)\n'
    + '\nContinue?';
  if(!confirm(summary)) return;

  // Remove the visit from the vehicle
  vehicle.visits = vehicle.visits.filter(vi => vi.id !== visitId);
  // Refresh top-level shim so the UI reads the next-current visit
  applyVisitShim(vehicle);
  vehicle.updatedAt = Date.now();
  save();
  toast('Visit deleted');
  render();
};

// Save vehicles to Firestore (batched write)
function setSyncStatus(status){
  const dot=document.getElementById('sync-dot');
  if(!dot)return;
  dot.className=status; // kept for backward compat
  // Visually color the dot
  const colors = {
    ok: '#10b981',        // green — synced
    syncing: '#f59e0b',   // amber — in progress
    err: '#ef4444',       // red — failed
  };
  dot.style.background = colors[status] || '#6b7280';
  dot.title = {
    ok: 'Synced to cloud ✓ (click for details)',
    syncing: 'Syncing…',
    err: 'Sync FAILED — tap for details',
  }[status] || 'Firestore sync status';
  // If error, pulse to draw attention
  if(status === 'err'){
    dot.style.animation = 'syncPulse 1.5s infinite';
  } else {
    dot.style.animation = '';
  }
}

// Click-to-diagnose sync health
window.showSyncStatus = function(){
  const vehicleCount = (ST.vehicles||[]).length;
  const jsonSize = JSON.stringify(ST.vehicles||[]).length;
  const sizeKB = Math.round(jsonSize / 1024);
  const pendingCount = pendingUnsyncedIds.size;
  const status = document.getElementById('sync-dot')?.className || 'unknown';
  const statusText = {
    ok: '✅ All good — latest data is in the cloud.',
    syncing: '⏳ Sync in progress…',
    err: '❌ SYNC FAILING — new changes exist only on this device!',
    '': '⚠ Sync state unknown. Check internet connection.'
  }[status] || 'Unknown status';

  let msg = statusText + '\n\n';
  msg += 'Records: ' + vehicleCount + '\n';
  msg += 'Data size: ' + sizeKB + ' KB\n';
  msg += 'Firestore limit: 1024 KB (1 MB)\n';
  if(sizeKB > 900){
    msg += '\n⚠ OVER SIZE LIMIT — Firestore cannot save. Run Storage Migration in Settings to fix.\n';
  }
  if(pendingCount > 0){
    msg += '\n' + pendingCount + ' record(s) saved locally only — not yet in cloud.\n';
  }
  alert(msg);
};

async function saveToFirestore(vehicles) {
  if(!db){setSyncStatus('err');return;}
  setSyncStatus('syncing');
  try {
    const json = JSON.stringify(vehicles);
    // Firestore limit is 1MB per document — skip sync if too big, keep local
    const sizeKB = json.length / 1024;
    if(sizeKB > 900){
      console.warn('Vehicles doc too big for Firestore:', Math.round(sizeKB)+'KB — saved locally only');
      // Remember every current vehicle ID as "pending unsynced" so next Firestore push
      // doesn't overwrite them with the stale cloud copy
      pendingUnsyncedIds = new Set(vehicles.map(v=>v.id));
      toast('⚠ Over 1MB — only saved locally. Run Storage Migration!','err');
      setSyncStatus('err');
      return;
    }
    const ref = db.collection('shops').doc('automotive_connection');
    await ref.set({
      vehicles: json,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    // Sync succeeded — clear the pending list
    pendingUnsyncedIds.clear();
    setSyncStatus('ok');
    console.log('Firestore save OK ✅ ('+Math.round(sizeKB)+'KB)');
  } catch(e) {
    setSyncStatus('err');
    console.error('Firestore save failed:', e);
    // Also mark all current IDs as pending on any sync error
    pendingUnsyncedIds = new Set(vehicles.map(v=>v.id));
    toast('Sync error — saved locally only','err');
  }
}

// Subscribe to real-time updates from Firestore
function subscribeToFirestore() {
  if(!db) return;
  if(unsubscribeFirestore) unsubscribeFirestore();
  setSyncStatus('syncing');
  unsubscribeFirestore = db.collection('shops').doc('automotive_connection')
    .onSnapshot(snap => {
      setSyncStatus('ok');
      if(!snap.exists){
        console.log('Firestore: no data yet — first use');
        return;
      }
      try {
        const data = snap.data();
        const incoming = JSON.parse(data.vehicles || '[]');
        const prev = ST.vehicles || [];

        // PROTECTION: preserve any local vehicles that failed to sync (pendingUnsyncedIds)
        // OR that simply don't exist in the incoming cloud data (local-only additions).
        // This prevents Firestore's stale copy from wiping out new records created
        // while the doc was over the size limit.
        const incomingIds = new Set(incoming.map(v=>v.id));
        const preservedLocal = prev.filter(v=>{
          if(!v || !v.id) return false;
          // If this local vehicle is flagged as pending, keep it
          if(pendingUnsyncedIds.has(v.id)) return true;
          // If Firestore doesn't know about it at all, also keep it
          if(!incomingIds.has(v.id)) return true;
          return false;
        });

        const merged = [...incoming, ...preservedLocal];
        ST.vehicles = merged;
        migrateVehiclesToVisits();
        applyVisitShimAll();

        const mergedJson = JSON.stringify(ST.vehicles);
        const prevJson = JSON.stringify(prev);

        if(mergedJson !== prevJson){
          try { localStorage.setItem(STORAGE_KEY, mergedJson); } catch(e) {}
          if(document.getElementById('app')?.style.display !== 'none'){
            render();
          }
          // If we merged in local-only vehicles OR migration changed the data,
          // push back to Firestore so the cloud catches up (size permitting)
          const incomingJson = JSON.stringify(incoming);
          if(mergedJson !== incomingJson){
            console.log('Local-only or migrated data detected — syncing back to Firestore');
            saveToFirestore(ST.vehicles);
          }
        } else {
          // Data unchanged, restore prev reference
          ST.vehicles = prev;
        }
      } catch(e) {
        console.warn('Firestore parse error:', e);
      }
    }, err => {
      setSyncStatus('err');
      console.error('Firestore subscription error:', err);
    });
}

// VISIT SHIM — transparent access to current visit fields
// All old code reads v.stockNumber, v.statuses, etc.
// Shim reads from current visit and writes to current visit
// ═══════════════════════════════════════════════
function applyVisitShim(v){
  if(!v || !Array.isArray(v.visits) || !v.visits.length) return v;
  const cur = currentVisit(v);
  if(!cur) return v;
  // Copy visit fields onto top-level of v so existing reads work
  const SHIM_FIELDS = ['stockNumber','statuses','assignedTo','priority',
    'apptDate','parts','laborLines','repairs','receipts','photos','notes',
    'concerns','comments','timeSessions'];
  SHIM_FIELDS.forEach(f => {
    if(cur[f] !== undefined) v[f] = cur[f];
  });
  return v;
}

// Apply shim to all vehicles after load / after Firestore sync
function applyVisitShimAll(){
  if(!Array.isArray(ST.vehicles)) return;
  ST.vehicles.forEach(applyVisitShim);
}

      }
    });
  } catch(e) {
    console.warn('Push init failed:', e);
  }
}

async function requestPushPermission(mechId){
  if(!messaging) return null;
  try {
    const permission = await Notification.requestPermission();
    if(permission !== 'granted'){
      toast('Notifications blocked — enable in phone settings','err');
      return null;
    }
    const reg = await navigator.serviceWorker.getRegistration();
    const token = await messaging.getToken({vapidKey: VAPID_KEY, serviceWorkerRegistration: reg});
    if(token && db){
      // Save token under mechanic's entry in Firestore
      await db.collection('shops').doc('ac_tokens').set({
        [mechId]: token,
        [mechId+'_updated']: firebase.firestore.FieldValue.serverTimestamp()
      },{merge:true});
      console.log('Push token saved for', mechId);
      pushToken = token;
      toast('Notifications enabled ✅');
      return token;
    }
  } catch(e) {
    console.error('Push permission error:',e);
    toast('Could not enable notifications: '+e.message,'err');
  }
  return null;
}

// Call the notify endpoint when a high-priority vehicle is assigned
async function notifyHighPriority(vehicle){
  if(!vehicle.assignedTo || vehicle.priority !== 'high') return;
  try {
    await fetch(AI_PROXY+'/notify',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        mechId: vehicle.assignedTo,
        vehicleId: vehicle.id,
        title: '🔴 High priority vehicle',
        body: `${vehicle.year||''} ${vehicle.make||''} ${vehicle.model||''} #${vehicle.stockNumber||'?'}`
      })
    });
    console.log('Notification sent to', vehicle.assignedTo);
  } catch(e){ console.warn('Notify failed:',e); }
}

// Enable notifications banner — shown once to each mechanic
function maybeShowNotifBanner(){
  if(!messaging) return;
  if(!ST.role) return;
  if(ST.role === 'manager' || ST.role === 'sales' || ST.role === 'detailer') return;
  if(Notification.permission === 'granted') return;
  if(Notification.permission === 'denied') return;
  if(localStorage.getItem('notif_banner_dismissed')==='1') return;

  const b = document.createElement('div');
  b.id='notif-banner';
  b.style.cssText='position:fixed;bottom:80px;left:12px;right:12px;z-index:800;background:#C8102E;color:#fff;border-radius:var(--r-lg);padding:13px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,.5);animation:fadeIn .2s';
  b.innerHTML=`<span style="font-size:22px">🔔</span>
    <div style="flex:1;font-size:12px;line-height:1.4"><div style="font-weight:700;margin-bottom:2px">Enable notifications</div><div style="opacity:.9">Get alerts for high-priority vehicles</div></div>
    <button id="nb-enable" style="background:#fff;color:#C8102E;border:none;border-radius:6px;padding:7px 12px;font-size:11px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;cursor:pointer">Enable</button>
    <button id="nb-dismiss" style="background:none;border:none;color:#fff;font-size:18px;padding:4px 8px;opacity:.7;cursor:pointer">✕</button>`;
  document.body.appendChild(b);
  document.getElementById('nb-enable').onclick = async()=>{
    await requestPushPermission(ST.role);
    b.remove();
  };
  document.getElementById('nb-dismiss').onclick = ()=>{
    localStorage.setItem('notif_banner_dismissed','1');
    b.remove();
  };
}

// ═══════════════════════════════════════════════
// BOOT

try { load(); } catch(e) { console.error('load() error:', e); }
try { render(); if(firebaseReady) initPushNotifications(); setTimeout(maybeShowNotifBanner, 2000); } catch(e) { 
  console.error('render() error:', e);
  // Fallback — show role screen directly
  const rs = document.getElementById('role-screen');
  if(rs) rs.style.display = 'flex';
}
